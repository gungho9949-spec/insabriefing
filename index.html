<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>인사브리핑 - 기업 연봉 비교</title>
<style>
body{font-family:sans-serif;background:#F2F4F8;margin:0;padding:20px;}
h1{color:#3B6EF8;font-size:22px;}
p{color:#666;margin-bottom:16px;}
table{width:100%;background:#fff;border-radius:12px;border-collapse:collapse;box-shadow:0 2px 8px rgba(0,0,0,0.1);}
th,td{padding:12px 16px;text-align:left;border-bottom:1px solid #eee;}
th{background:#3B6EF8;color:#fff;}
tr:last-child td{border-bottom:none;}
.salary{font-weight:bold;color:#E53935;}
</style>
</head>
<body>
<h1>💰 인사브리핑 - 기업 연봉 비교</h1>
<p id="status">데이터 불러오는 중...</p>
<table>
<thead><tr><th>순위</th><th>기업명</th><th>업종</th><th>평균연봉</th><th>직원수</th></tr></thead>
<tbody id="list"></tbody>
</table>
<script>
const URL = 'https://ylsneyixrbgssfljvpaj.supabase.co/rest/v1';
const KEY = 'sb_publishable_MLvTQx0gxmhwsG533vkpqg_E-YKN6lU';
const H = {'apikey':KEY,'Authorization':'Bearer '+KEY};
async function load() {
  const [c, s] = await Promise.all([
    fetch(URL+'/companies?select=*',{headers:H}).then(r=>r.json()),
    fetch(URL+'/salary_data?select=*&data_year=eq.2024',{headers:H}).then(r=>r.json())
  ]);
  const map = {};
  s.forEach(x=>map[x.company_id]=x);
  const merged = c.map(x=>({...x, salary:map[x.id]}));
  merged.sort((a,b)=>(b.salary?.avg_salary_wan||0)-(a.salary?.avg_salary_wan||0));
  document.getElementById('status').textContent = '총 '+c.length+'개 기업 · 2024년 기준';
  document.getElementById('list').innerHTML = merged.map((c,i)=>{
    const sal = c.salary?.avg_salary_wan;
    const salStr = sal ? (sal>=10000?(sal/10000).toFixed(2)+'억':sal.toLocaleString()+'만')+'원' : '-';
    const emp = c.salary?.employee_count;
    return '<tr><td>'+(i+1)+'</td><td>'+c.company_name+'</td><td>'+(c.industry||'-')+'</td><td class="salary">'+salStr+'</td><td>'+(emp?emp.toLocaleString()+'명':'-')+'</td></tr>';
  }).join('');
}
load();
</script>
</body>
</html>
