<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>기업 연봉 비교 — 인사브리핑</title>
<style>
@import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
:root{--bg:#F2F4F8;--card:#fff;--blue:#3B6EF8;--blue-soft:#EEF2FF;--ink:#111827;--gray:#6B7280;--border:#E5E7EB;--shadow:0 2px 12px rgba(0,0,0,0.07);--up:#E53935;--down:#1B9E6E;--radius:14px;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--ink);font-family:'Pretendard',-apple-system,sans-serif;}
header{background:var(--card);border-bottom:1px solid var(--border);padding:0 20px;display:flex;justify-content:space-between;align-items:center;height:56px;position:sticky;top:0;z-index:50;}
.brand{font-size:19px;font-weight:800;}.brand span{color:var(--blue);}
.hamburger{display:flex;flex-direction:column;gap:5px;cursor:pointer;padding:4px;}
.hamburger span{width:22px;height:2px;background:var(--ink);border-radius:2px;}
nav.desktop{display:none;gap:2px;}
nav.desktop a{padding:6px 12px;font-size:14px;font-weight:500;color:var(--gray);text-decoration:none;border-radius:6px;}
nav.desktop a.active{color:var(--blue);background:var(--blue-soft);font-weight:700;}
.container{max-width:800px;margin:0 auto;padding:24px 16px;}
.page-title h1{font-size:22px;font-weight:800;margin-bottom:4px;}
.dart-badge{background:#F0FDF4;color:#16A34A;border:1px solid #BBF7D0;border-radius:99px;padding:2px 10px;font-size:11px;font-weight:700;}
.search-card{background:var(--card);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);margin-bottom:16px;}
.search-top{display:flex;gap:10px;margin-bottom:12px;}
.search-top input{flex:1;border:1.5px solid var(--border);border-radius:10px;padding:11px 14px;font-size:15px;font-family:inherit;outline:none;}
.btn-search{background:var(--blue);color:#fff;border:none;border-radius:10px;padding:11px 18px;font-size:14px;font-weight:700;cursor:pointer;}
.filter-row{display:flex;gap:8px;flex-wrap:wrap;}
.filter-row select{border:1.5px solid var(--border);border-radius:8px;padding:8px 12px;font-size:13px;font-family:inherit;background:var(--bg);outline:none;flex:1;min-width:110px;}
.btn-reset{border:1.5px solid var(--border);border-radius:8px;padding:8px 14px;font-size:13px;font-family:inherit;color:var(--gray);background:var(--card);cursor:pointer;}
.stats-row{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:16px;}
.stat-card{background:var(--card);border-radius:12px;padding:16px;box-shadow:var(--shadow);}
.stat-card .slabel{font-size:11px;color:var(--gray);font-weight:700;margin-bottom:6px;}
.stat-card .svalue{font-size:22px;font-weight:800;}
.stat-card .ssub{font-size:11px;color:var(--gray);margin-top:3px;}
.loading-box{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:60px 20px;text-align:center;}
.spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 16px;}
@keyframes spin{to{transform:rotate(360deg);}}
.company-list{display:flex;flex-direction:column;background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;}
.list-head{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
.sort-tabs{display:flex;overflow-x:auto;border-bottom:1px solid var(--border);}
.sort-tab{padding:10px 14px;font-size:12px;font-weight:600;color:var(--gray);white-space:nowrap;cursor:pointer;border-bottom:2px solid transparent;background:none;border-top:none;border-left:none;border-right:none;font-family:inherit;}
.sort-tab.active{color:var(--blue);border-bottom:2px solid var(--blue);}
.company-row{display:flex;align-items:center;padding:14px 16px;border-bottom:1px solid var(--border);cursor:pointer;gap:12px;}
.row-rank{font-size:13px;font-weight:800;color:#D1D5DB;width:22px;text-align:center;flex-shrink:0;}
.row-rank.t1{color:#F59E0B;}.row-rank.t2{color:#9CA3AF;}.row-rank.t3{color:#B45309;}
.row-main{flex:1;min-width:0;}
.row-name{font-size:15px;font-weight:700;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.row-right{text-align:right;flex-shrink:0;}
.row-salary{font-size:17px;font-weight:800;font-family:monospace;}
.row-salary.high{color:var(--up);}
.badge{display:inline-block;font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px;}
.b-IT{background:#EEF2FF;color:#3B6EF8;}.b-제조{background:#FFF7ED;color:#EA580C;}
.b-금융{background:#F0FDF4;color:#16A34A;}.b-바이오{background:#FDF4FF;color:#9333EA;}
.b-유통{background:#FFFBEB;color:#D97706;}.b-건설{background:#F1F5F9;color:#475569;}
.b-에너지{background:#FEF3C7;color:#D97706;}.b-기타{background:#F9FAFB;color:#6B7280;}
.pagination{display:flex;justify-content:center;gap:6px;padding:16px;flex-wrap:wrap;}
.page-btn{width:36px;height:36px;border-radius:8px;border:1.5px solid var(--border);background:var(--card);font-size:13px;font-weight:600;cursor:pointer;color:var(--ink);}
.page-btn.active{background:var(--blue);color:#fff;border-color:var(--blue);}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:100;opacity:0;pointer-events:none;transition:opacity .25s;}
.modal-overlay.open{opacity:1;pointer-events:all;}
.modal{position:absolute;bottom:0;left:0;right:0;background:var(--card);border-radius:20px 20px 0 0;padding:20px 20px 36px;transform:translateY(100%);transition:transform .3s;max-height:90vh;overflow-y:auto;}
.modal-overlay.open .modal{transform:translateY(0);}
.modal-handle{width:40px;height:4px;background:var(--border);border-radius:99px;margin:0 auto 16px;}
.modal-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px;}
.modal-top h2{font-size:20px;font-weight:800;}
.modal-close{background:none;border:none;font-size:22px;cursor:pointer;color:var(--gray);}
.modal-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.modal-item{background:var(--bg);border-radius:10px;padding:14px;}
.modal-item .mlabel{font-size:11px;color:var(--gray);font-weight:700;margin-bottom:5px;}
.modal-item .mvalue{font-size:20px;font-weight:800;}
.modal-item .msub{font-size:11px;color:var(--gray);margin-top:3px;}
.modal-note{font-size:12px;color:var(--gray);line-height:1.7;background:var(--bg);border-radius:10px;padding:12px 14px;}
.up{color:var(--up);}
.debug-box{background:#FFF3CD;border:1px solid #FFC107;border-radius:10px;padding:12px 16px;margin-bottom:16px;font-size:12px;color:#856404;display:none;}
footer{text-align:center;padding:24px 16px;font-size:12px;color:var(--gray);border-top:1px solid var(--border);background:var(--card);margin-top:24px;}
@media(min-width:768px){
  .stats-row{grid-template-columns:repeat(4,1fr);}
  nav.desktop{display:flex;}
  .hamburger{display:none!important;}
  .modal{position:relative;bottom:auto;left:auto;right:auto;border-radius:16px;max-width:540px;margin:auto;transform:translateY(20px);max-height:none;}
  .modal-overlay{display:flex;align-items:center;justify-content:center;padding:20px;}
  .modal-overlay.open .modal{transform:translateY(0);}
  .modal-handle{display:none;}
}
