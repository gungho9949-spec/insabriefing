<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Wild Peaks Radio</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Helvetica Neue',Arial,sans-serif;color:#fff;touch-action:none;}

/* 스플래시 */
#splash{position:fixed;inset:0;background:#000;z-index:1000;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;transition:opacity 1s;}
#splash.hide{opacity:0;pointer-events:none;}
#splash img{width:220px;height:220px;object-fit:contain;animation:splashIn 1s ease;}
#splash-title{
  font-size:28px;font-weight:900;
  background:linear-gradient(135deg,#ff6b00,#ffd700,#ff6b00);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  letter-spacing:4px;text-shadow:none;
  font-family:Georgia,serif;
  animation:splashIn 1.2s ease;
}
#splash-sub{font-size:13px;color:#aaa;letter-spacing:1px;animation:splashIn 1.4s ease;}
@keyframes splashIn{from{opacity:0;transform:scale(0.8)}to{opacity:1;transform:scale(1)}}

/* 지구본 */
#globe-wrap{position:fixed;inset:0;bottom:130px;}
#c{width:100%;height:100%;display:block;cursor:grab;}
#c:active{cursor:grabbing;}

/* 로딩 */
#loading{position:fixed;inset:0;bottom:130px;background:#000;z-index:500;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;transition:opacity .6s;}
#loading.hide{opacity:0;pointer-events:none;}
#ld-bar{width:200px;height:3px;background:#111;border-radius:2px;overflow:hidden;}
#ld-fill{height:100%;width:0%;background:#4dff91;border-radius:2px;transition:width .3s;}
#ld-txt{font-size:12px;color:#4dff91;}

/* 오른쪽 사이드 버튼 */
#side-btns{position:fixed;right:14px;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;gap:10px;z-index:40;}
.side-btn{width:40px;height:40px;border-radius:50%;background:rgba(0,0,0,.6);border:1px solid rgba(255,255,255,.2);color:#fff;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(8px);transition:background .2s;}
.side-btn:hover{background:rgba(77,255,145,.3);}
.side-btn.active{background:rgba(77,255,145,.4);border-color:#4dff91;}

/* 줌 버튼 */
#zoom-wrap{position:fixed;right:14px;bottom:160px;display:flex;flex-direction:column;gap:6px;z-index:40;}
.zbtn{width:36px;height:36px;border-radius:50%;background:rgba(0,0,0,.6);border:1px solid rgba(255,255,255,.2);color:#fff;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;}

/* 하단 패널 */
#panel{position:fixed;left:0;right:0;bottom:52px;height:78px;background:rgba(6,6,16,.97);border-top:1px solid #1a1a30;padding:8px 14px 6px;display:flex;flex-direction:column;z-index:50;}
#row1{display:flex;align-items:center;gap:10px;margin-bottom:5px;}
#badge{width:32px;height:32px;border-radius:50%;background:#1a1a30;border:1.5px solid #2a2a50;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#4dff91;flex-shrink:0;}
#city-name{font-size:19px;font-weight:700;line-height:1;}
#city-country{font-size:11px;color:#666;margin-top:1px;}
#local-time{margin-left:auto;font-size:14px;color:#555;font-variant-numeric:tabular-nums;}
#row2{display:flex;align-items:center;gap:8px;border-top:1px solid #111;padding-top:5px;}
#freq-box{flex:1;min-width:0;}
#freq-name{color:#4dff91;font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
#freq-loc{font-size:10px;color:#444;}
#status{font-size:10px;color:#444;min-height:11px;}
#status.on{color:#4dff91;}#status.er{color:#ff5566;}
#eq{display:none;align-items:flex-end;gap:2px;height:13px;margin-left:4px;}
#eq.on{display:flex;}
.eb{width:3px;background:#4dff91;border-radius:1px;animation:eqb .45s ease-in-out infinite alternate;}
.eb:nth-child(1){animation-delay:0s}.eb:nth-child(2){animation-delay:.1s}.eb:nth-child(3){animation-delay:.18s}.eb:nth-child(4){animation-delay:.05s}
@keyframes eqb{from{height:2px}to{height:12px}}
.cbtn{background:none;border:none;color:#aaa;cursor:pointer;font-size:17px;padding:3px 5px;transition:color .15s;}
.cbtn:hover{color:#fff;}
#play-btn{font-size:20px;color:#fff;}

/* 하단 네비 */
#nav{position:fixed;left:0;right:0;bottom:0;height:52px;background:#060610;border-top:1px solid #111;display:flex;justify-content:space-around;align-items:center;z-index:60;}
.ni{display:flex;flex-direction:column;align-items:center;gap:2px;font-size:9px;color:#333;cursor:pointer;padding:4px 8px;transition:color .15s;}
.ni.active{color:#4dff91;}
.ni svg{width:20px;height:20px;}

/* 방송국 시트 */
#sheet-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;align-items:flex-end;}
#sheet-overlay.open{display:flex;}
#sheet{width:100%;max-height:65vh;overflow-y:auto;background:#0a0a18;border-radius:16px 16px 0 0;padding-bottom:20px;}
#sh-head{position:sticky;top:0;background:#0a0a18;padding:12px 16px 10px;border-bottom:1px solid #1a1a2a;display:flex;justify-content:space-between;align-items:center;}
#sh-city{font-size:14px;font-weight:700;color:#4dff91;}
#sh-close{background:none;border:none;color:#555;font-size:20px;cursor:pointer;}
.sitem{padding:12px 16px;border-bottom:1px solid #0f0f1e;cursor:pointer;display:flex;align-items:center;gap:10px;transition:background .12s;}
.sitem:hover,.sitem.playing{background:#141428;}
.sitem.playing{border-left:3px solid #4dff91;}
.si-info{flex:1;min-width:0;}
.si-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.si-meta{font-size:10px;color:#444;margin-top:2px;}
.si-heart{font-size:18px;color:#333;cursor:pointer;padding:4px;transition:color .15s;}
.si-heart.loved{color:#ff4466;}
#sh-nearby{padding:12px 16px 6px;font-size:12px;font-weight:700;color:#555;}

/* 즐겨찾기 패널 */
#fav-panel{display:none;position:fixed;inset:0;bottom:52px;background:#060610;z-index:100;overflow-y:auto;}
#fav-panel.open{display:block;}
#fav-head{padding:16px;border-bottom:1px solid #111;font-size:18px;font-weight:700;}
.fitem{padding:12px 16px;border-bottom:1px solid #0f0f1e;cursor:pointer;display:flex;align-items:center;gap:10px;}
.fitem:hover{background:#0f0f1e;}
.fi-info{flex:1;}
.fi-name{font-size:13px;font-weight:600;}
.fi-loc{font-size:10px;color:#444;margin-top:2px;}
.fi-del{color:#333;font-size:16px;cursor:pointer;padding:4px;}
.fi-del:hover{color:#ff4466;}
#fav-empty{padding:40px;text-align:center;color:#333;font-size:13px;}

/* 검색 패널 */
#search-panel{display:none;position:fixed;inset:0;bottom:52px;background:#060610;z-index:100;}
#search-panel.open{display:block;}
#search-head{padding:16px 16px 10px;border-bottom:1px solid #111;}
#search-input{width:100%;background:#111;border:1px solid #222;border-radius:10px;color:#fff;font-size:14px;padding:10px 14px;outline:none;}
#search-input:focus{border-color:#4dff91;}
#search-results{overflow-y:auto;height:calc(100% - 80px);}
.sritem{padding:12px 16px;border-bottom:1px solid #0f0f1e;cursor:pointer;display:flex;align-items:center;gap:10px;}
.sritem:hover{background:#0f0f1e;}
.sr-dot{width:10px;height:10px;border-radius:50%;background:#4dff91;flex-shrink:0;}
.sr-info{flex:1;}
.sr-name{font-size:13px;font-weight:600;}
.sr-loc{font-size:10px;color:#444;margin-top:2px;}

/* 설정 패널 */
#settings-panel{display:none;position:fixed;inset:0;bottom:52px;background:#060610;z-index:100;overflow-y:auto;}
#settings-panel.open{display:block;}
#set-head{padding:16px;border-bottom:1px solid #111;font-size:18px;font-weight:700;}
.set-section{padding:12px 16px 6px;font-size:11px;font-weight:700;color:#444;text-transform:uppercase;}
.set-item{padding:14px 16px;border-bottom:1px solid #0f0f1e;display:flex;align-items:center;cursor:pointer;}
.set-item:hover{background:#0f0f1e;}
.set-label{flex:1;font-size:14px;}
.set-value{font-size:13px;color:#555;}
.set-arrow{color:#333;margin-left:8px;}

/* 언어 서브패널 */
#lang-panel{display:none;position:fixed;inset:0;bottom:52px;background:#060610;z-index:110;overflow-y:auto;}
#lang-panel.open{display:block;}
#lang-head{padding:16px;border-bottom:1px solid #111;font-size:18px;font-weight:700;display:flex;align-items:center;gap:10px;}
#lang-back{background:none;border:none;color:#4dff91;font-size:14px;cursor:pointer;}
.lang-item{padding:14px 16px;border-bottom:1px solid #0f0f1e;cursor:pointer;display:flex;align-items:center;}
.lang-item:hover{background:#0f0f1e;}
.lang-item.selected{color:#4dff91;}
.lang-name{flex:1;font-size:14px;}
.lang-native{font-size:11px;color:#555;margin-top:2px;}
.lang-check{color:#4dff91;font-size:16px;}

/* 점크기 서브패널 */
#dotsize-panel{display:none;position:fixed;inset:0;bottom:52px;background:#060610;z-index:110;overflow-y:auto;}
#dotsize-panel.open{display:block;}
#ds-head{padding:16px;border-bottom:1px solid #111;font-size:18px;font-weight:700;display:flex;align-items:center;gap:10px;}
#ds-back{background:none;border:none;color:#4dff91;font-size:14px;cursor:pointer;}
.ds-item{padding:16px;border-bottom:1px solid #0f0f1e;cursor:pointer;display:flex;align-items:center;gap:12px;}
.ds-item:hover{background:#0f0f1e;}
.ds-item.selected{color:#4dff91;}
.ds-dot{border-radius:50%;background:#4dff91;flex-shrink:0;}

/* 툴팁 */
#tip{position:fixed;pointer-events:none;background:rgba(0,0,10,.9);border:1px solid #4dff91;border-radius:7px;padding:6px 10px;font-size:11px;display:none;z-index:300;white-space:nowrap;}
#tip-n{font-weight:700;color:#4dff91;font-size:12px;}
#tip-c{color:#888;font-size:10px;}

/* 라이브 준비중 */
#live-panel{display:none;position:fixed;inset:0;bottom:52px;background:#060610;z-index:100;align-items:center;justify-content:center;flex-direction:column;gap:16px;}
#live-panel.open{display:flex;}
</style>
</head>
<body>

<!-- 스플래시 -->
<div id="splash">
  <img src="https://insabriefing-s2uw.vercel.app/logo.png" alt="Wild Peaks">
  <div id="splash-title">WILD PEAKS RADIO</div>
  <div id="splash-sub"></div></div>

<!-- 로딩 -->
<div id="loading">
  <div id="ld-txt">방송국 불러오는 중…</div>
  <div id="ld-bar"><div id="ld-fill"></div></div>
</div>

<div id="globe-wrap"><canvas id="c"></canvas></div>

<!-- 사이드 버튼 -->
<div id="side-btns">
  <button class="side-btn" id="btn-myloc" title="내 위치">📍</button>
  <button class="side-btn" id="btn-share" title="공유">🔗</button>
  <button class="side-btn" id="btn-lock" title="잠금">🔓</button>
</div>

<!-- 줌 -->
<div id="zoom-wrap">
  <button class="zbtn" id="zin">+</button>
  <button class="zbtn" id="zout">−</button>
</div>

<!-- 하단 패널 -->
<div id="panel">
  <div id="row1">
    <div id="badge">WP</div>
    <div>
      <div id="city-name">지구를 클릭하세요</div>
      <div id="city-country">Wild Peaks Radio</div>
    </div>
    <div id="local-time">--:--</div>
  </div>
  <div id="row2">
    <div id="freq-box">
      <div style="display:flex;align-items:center">
        <div id="freq-name">방송국을 선택하세요</div>
        <div id="eq"><div class="eb"></div><div class="eb"></div><div class="eb"></div><div class="eb"></div></div>
      </div>
      <div id="freq-loc"></div>
      <div id="status"></div>
    </div>
    <button class="cbtn" id="mute-btn">🔊</button>
    <button class="cbtn" id="play-btn">▶</button>
    <button class="cbtn" id="next-btn">⏭</button>

</div>

<!-- 네비 -->
<div id="nav">
  <div class="ni active" id="nav-explore">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="2"/></svg>탐색
  </div>
  <div class="ni" id="nav-fav">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>즐겨찾기
  </div>
  <div class="ni" id="nav-live">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polygon points="10 8 16 12 10 16 10 8" fill="currentColor"/></svg>라이브
  </div>
  <div class="ni" id="nav-search">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>검색
  </div>
  <div class="ni" id="nav-settings">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>설정
  </div>
</div>

<!-- 방송국 시트 -->
<div id="sheet-overlay">
  <div id="sheet">
    <div id="sh-head">
      <span id="sh-city">방송국 선택</span>
      <button id="sh-close">✕</button>
    </div>
    <div id="sh-body"></div>
  </div>
</div>

<!-- 즐겨찾기 패널 -->
<div id="fav-panel">
  <div id="fav-head">❤️ 즐겨찾기</div>
  <div id="fav-body"></div>
</div>

<!-- 검색 패널 -->
<div id="search-panel">
  <div id="search-head">
    <input id="search-input" type="text" placeholder="🔍 도시 또는 방송국 검색…">
  </div>
  <div id="search-results"></div>
</div>

<!-- 라이브 패널 -->
<div id="live-panel">
  <div style="font-size:40px">📺</div>
  <div style="font-size:18px;font-weight:700">라이브 준비중</div>
  <div style="font-size:13px;color:#555;text-align:center">YouTube 라이브 기능이<br>곧 추가될 예정이에요!</div>
  <a href="https://youtube.com/@wildpeaks-wp" target="_blank"
     style="margin-top:10px;padding:10px 20px;background:#ff0000;border-radius:20px;color:#fff;text-decoration:none;font-size:13px;font-weight:700;">
    ▶ Wild Peaks YouTube 보기
  </a>
</div>

<!-- 설정 패널 -->
<div id="settings-panel">
  <div id="set-head">⚙️ 설정</div>
  <div class="set-section">정보</div>
  <div class="set-item" onclick="window.open('https://youtube.com/@wildpeaks-wp','_blank')">
    <span class="set-label">🎬 Wild Peaks YouTube</span>
    <span class="set-value">구독하기</span><span class="set-arrow">›</span>
  </div>
  <div class="set-item">
    <span class="set-label">📻 Wild Peaks Radio</span>
    <span class="set-value">v1.0</span>
  </div>
  <div class="set-section">맞춤 설정</div>
  <div class="set-item" id="set-lang">
    <span class="set-label">🌐 언어</span>
    <span class="set-value" id="set-lang-val">한국어</span><span class="set-arrow">›</span>
  </div>
  <div class="set-item" id="set-dotsize">
    <span class="set-label">● 지구본 점 크기</span>
    <span class="set-value" id="set-ds-val">보통</span><span class="set-arrow">›</span>
  </div>
</div>

<!-- 언어 패널 -->
<div id="lang-panel">
  <div id="lang-head">
    <button id="lang-back">‹ 설정</button>
    <span id="lang-title">언어</span>
  </div>
  <div id="lang-body"></div>
</div>

<!-- 점크기 패널 -->
<div id="dotsize-panel">
  <div id="ds-head">
    <button id="ds-back">‹ 설정</button>
    <span>지구본 점 크기</span>
  </div>
  <div id="ds-body">
    <div class="ds-item" data-size="small" onclick="setDotSize('small')">
      <div class="ds-dot" style="width:8px;height:8px;"></div>
      <span>작게</span>
    </div>
    <div class="ds-item selected" data-size="medium" onclick="setDotSize('medium')">
      <div class="ds-dot" style="width:12px;height:12px;"></div>
      <span>보통</span>
    </div>
    <div class="ds-item" data-size="large" onclick="setDotSize('large')">
      <div class="ds-dot" style="width:18px;height:18px;"></div>
      <span>크게</span>
    </div>
  </div>
</div>

<!-- 툴팁 -->
<div id="tip"><div id="tip-n"></div><div id="tip-c"></div></div>
<audio id="aud" preload="none"></audio>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ══════════════════════════════════════════
//  언어 데이터
// ══════════════════════════════════════════
const LANGS=[
  {code:'ko',name:'한국어',native:'한국어'},
  {code:'en',name:'English',native:'English'},
  {code:'ja',name:'日本語',native:'日本語'},
  {code:'zh-TW',name:'繁體中文',native:'繁體中文'},
  {code:'zh-CN',name:'简体中文',native:'简体中文'},
  {code:'es',name:'Español',native:'Español'},
  {code:'es-LA',name:'Español latinoamericano',native:'Español latinoamericano'},
  {code:'fr',name:'français',native:'français'},
  {code:'de',name:'Deutsch',native:'Deutsch'},
  {code:'pt',name:'Português',native:'Português'},
  {code:'pt-BR',name:'Português (Brasil)',native:'Português (Brasil)'},
  {code:'it',name:'Italiano',native:'Italiano'},
  {code:'nl',name:'Nederlands',native:'Nederlands'},
  {code:'da',name:'dansk',native:'dansk'},
  {code:'no',name:'norsk',native:'norsk'},
  {code:'sv',name:'svenska',native:'svenska'},
  {code:'pl',name:'polski',native:'polski'},
  {code:'ro',name:'română',native:'română'},
  {code:'el',name:'Ελληνικά',native:'Ελληνικά'},
  {code:'he',name:'עברית',native:'עברית'},
  {code:'ar',name:'العربية',native:'العربية'},
  {code:'ru',name:'русский',native:'русский'},
  {code:'tr',name:'Türkçe',native:'Türkçe'},
  {code:'id',name:'Bahasa Indonesia',native:'Bahasa Indonesia'},
  {code:'ms',name:'Bahasa Melayu',native:'Bahasa Melayu'},
  {code:'th',name:'ภาษาไทย',native:'ภาษาไทย'},
  {code:'vi',name:'Tiếng Việt',native:'Tiếng Việt'},
  {code:'fil',name:'Filipino',native:'Filipino'},
  {code:'hi',name:'हिन्दी',native:'हिन्दी'},
  {code:'bn',name:'বাংলা',native:'বাংলা'},
  {code:'ta',name:'தமிழ்',native:'தமிழ்'},
];

let currentLang='ko';
let dotSizeMode='medium';
let globeLocked=false;
let favorites=JSON.parse(localStorage.getItem('wp_favorites')||'[]');

// ══════════════════════════════════════════
//  Three.js
// ══════════════════════════════════════════
const wrap=document.getElementById('globe-wrap');
const canvas=document.getElementById('c');
const renderer=new THREE.WebGLRenderer({canvas,antialias:true,powerPreference:'high-performance'});
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2.5));
renderer.setClearColor(0x000005,1);
const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(40,1,0.01,100);
camera.position.set(0,0,2.8);

// 지구
const earthGeo=new THREE.SphereGeometry(1,96,96);
const earthMat=new THREE.MeshPhongMaterial({color:0x2255aa,shininess:15,specular:new THREE.Color(0x224466)});
const earth=new THREE.Mesh(earthGeo,earthMat);
const TL=new THREE.TextureLoader();

//  방송국 점 (API에서 전 세계 불러오기)
// ══════════════════════════════════════════
let allStations=[];
let meshes=[];
let selMesh=null;
let currentCity=null;
let currentStations=[];
let stIdx=0;

function ll2v3(lat,lon,r=1.015){
  const phi=(90-lat)*Math.PI/180,th=(lon+180)*Math.PI/180;
  return new THREE.Vector3(-r*Math.sin(phi)*Math.cos(th),r*Math.cos(phi),r*Math.sin(phi)*Math.sin(th));
}

function getDotRadius(){
  return dotSizeMode==='small'?0.006:dotSizeMode==='large'?0.014:0.009;
}

function buildDots(stations){
  // 기존 점 제거
  meshes.forEach(m=>globeGroup.remove(m));
  meshes=[];
  const r=getDotRadius();
  const geo=new THREE.SphereGeometry(r,6,6);
  const mat=new THREE.MeshBasicMaterial({color:0x4dff91,transparent:true,opacity:0.85});
  // 위치별로 그룹핑 (같은 위치 방송국 하나의 점으로)
  const clusters={};
  stations.forEach(s=>{
    if(!s.geo_lat||!s.geo_long)return;
    const key=`${Math.round(s.geo_lat*10)/10}_${Math.round(s.geo_long*10)/10}`;
    if(!clusters[key])clusters[key]={lat:s.geo_lat,lon:s.geo_long,stations:[],name:s.country};
    clusters[key].stations.push(s);
  });
  Object.values(clusters).forEach(c=>{
    const m=new THREE.Mesh(geo,mat.clone());
    m.position.copy(ll2v3(c.lat,c.lon));
    m.userData={lat:c.lat,lon:c.lon,name:c.name,stations:c.stations};
    globeGroup.add(m);
    meshes.push(m);
  });
}

async function loadAllStations(){
  document.getElementById('ld-txt').textContent='전 세계 방송국 불러오는 중…';
  document.getElementById('ld-fill').style.width='20%';
  try{
    const r=await fetch('https://de1.api.radio-browser.info/json/stations?limit=2000&hidebroken=true&has_geo_info=true&order=votes&reverse=true',
      {headers:{'User-Agent':'WildPeaksRadio/1.0'}});
    const data=await r.json();
    allStations=data.filter(s=>s.geo_lat&&s.geo_long&&s.url_resolved);
    document.getElementById('ld-fill').style.width='80%';
    buildDots(allStations);
    document.getElementById('ld-fill').style.width='100%';
    setTimeout(()=>{
      document.getElementById('loading').classList.add('hide');
    },400);
  }catch(e){
    document.getElementById('ld-txt').textContent='오류 — 재시도 중…';
    setTimeout(loadAllStations,3000);
  }
}

let drag=false,didMove=false,lx=0,ly=0,vx=0,vy=0;
let autoSpin=true,zDist=2.8,pinching=false,pinchD0=0,zDist0=0;
const DRAG_SPD=0.004,FRICTION=0.92,AUTO_SPD=0.0003;

function pdist(t){return Math.hypot(t[0].clientX-t[1].clientX,t[0].clientY-t[1].clientY);}

canvas.addEventListener('mousedown',e=>{if(globeLocked)return;drag=true;didMove=false;lx=e.clientX;ly=e.clientY;vx=vy=0;autoSpin=false;},{passive:true});
window.addEventListener('mouseup',()=>drag=false);
window.addEventListener('mousemove',e=>{
  if(!drag||globeLocked)return;
  const dx=e.clientX-lx,dy=e.clientY-ly;
  if(Math.abs(dx)+Math.abs(dy)>2)didMove=true;
  vy=dx*DRAG_SPD;vx=dy*DRAG_SPD;
  globeGroup.rotation.y+=vy;
  globeGroup.rotation.x=Math.max(-Math.PI/2,Math.min(Math.PI/2,globeGroup.rotation.x+vx));
  lx=e.clientX;ly=e.clientY;
});
canvas.addEventListener('touchstart',e=>{
  e.preventDefault();
  if(e.touches.length===1&&!globeLocked){drag=true;didMove=false;lx=e.touches[0].clientX;ly=e.touches[0].clientY;vx=vy=0;autoSpin=false;}
  else if(e.touches.length===2){drag=false;pinching=true;pinchD0=pdist(e.touches);zDist0=zDist;}
},{passive:false});
window.addEventListener('touchend',e=>{drag=false;if(e.touches.length<2)pinching=false;},{passive:true});
window.addEventListener('touchmove',e=>{
  e.preventDefault();
  if(pinching&&e.touches.length===2){const d=pdist(e.touches);zDist=Math.max(1.2,Math.min(6,zDist0*(pinchD0/d)));camera.position.z=zDist;return;}
  if(!drag||globeLocked||e.touches.length!==1)return;
  const dx=e.touches[0].clientX-lx,dy=e.touches[0].clientY-ly;
  if(Math.abs(dx)+Math.abs(dy)>2)didMove=true;
  const spd=DRAG_SPD*(zDist/2.8);
  vy=dx*spd;vx=dy*spd;
  globeGroup.rotation.y+=vy;
  globeGroup.rotation.x=Math.max(-Math.PI/2,Math.min(Math.PI/2,globeGroup.rotation.x+vx));
  lx=e.touches[0].clientX;ly=e.touches[0].clientY;
},{passive:false});
canvas.addEventListener('wheel',e=>{e.preventDefault();zDist*=e.deltaY<0?0.92:1.09;zDist=Math.max(1.2,Math.min(6,zDist));camera.position.z=zDist;},{passive:false});
document.getElementById('zin').onclick=()=>{zDist=Math.max(1.2,zDist*0.82);camera.position.z=zDist;};
document.getElementById('zout').onclick=()=>{zDist=Math.min(6,zDist*1.22);camera.position.z=zDist;};

//  레이캐스트
// ══════════════════════════════════════════
const ray=new THREE.Raycaster();
ray.params.Mesh={threshold:0.01};
const mouse=new THREE.Vector2();
function hitMesh(ex,ey){
  const r=canvas.getBoundingClientRect();
  mouse.x=((ex-r.left)/r.width)*2-1;
  mouse.y=-((ey-r.top)/r.height)*2+1;
  ray.setFromCamera(mouse,camera);
  const hits=ray.intersectObjects(meshes);
  return hits.length?hits[0].object:null;
}

canvas.addEventListener('mouseup',e=>{if(!didMove)handleClick(e.clientX,e.clientY);});
canvas.addEventListener('touchend',e=>{if(!didMove&&e.changedTouches.length===1)handleClick(e.changedTouches[0].clientX,e.changedTouches[0].clientY);});

function handleClick(ex,ey){
  const hit=hitMesh(ex,ey);
  if(!hit)return;
  if(selMesh&&selMesh!==hit)selMesh.material.color.setHex(0x4dff91);
  selMesh=hit;
  hit.material.color.setHex(0xffffff);
  ring.position.copy(hit.position);
  ring.quaternion.setFromUnitVectors(new THREE.Vector3(0,0,1),hit.position.clone().normalize());
  ring.visible=true;
  showStationSheet(hit.userData);
}

let frame=0;
(function animate(){
  requestAnimationFrame(animate);frame++;
  if(!drag&&!pinching){
    if(autoSpin)globeGroup.rotation.y+=AUTO_SPD;
    else{vx*=FRICTION;vy*=FRICTION;globeGroup.rotation.y+=vy;globeGroup.rotation.x=Math.max(-Math.PI/2,Math.min(Math.PI/2,globeGroup.rotation.x+vx));}
  }
  if(ring.visible){ringMat.opacity=0.7+0.3*Math.sin(frame*0.1);ring.scale.setScalar(1+0.06*Math.sin(frame*0.08));}
  renderer.render(scene,camera);
})();

//  GPS & 위치 이동
// ══════════════════════════════════════════
function flyTo(lat,lon,targetZ=2.2){
  const tY=-(lon+180)*Math.PI/180+Math.PI;
  const tX=-(90-lat)*Math.PI/180+Math.PI/2;
  const startY=globeGroup.rotation.y,startX=globeGroup.rotation.x;
  const startZ=camera.position.z;
  let t=0;
  function step(){
    t+=0.015;if(t>1)t=1;
    const e=t<0.5?2*t*t:1-Math.pow(-2*t+2,2)/2;
    globeGroup.rotation.y=startY+(tY-startY)*e;
    globeGroup.rotation.x=startX+(tX-startX)*e;
    camera.position.z=startZ+(targetZ-startZ)*e;
    zDist=camera.position.z;
    if(t<1)requestAnimationFrame(step);
  }
  step();
}

function showStationSheet(data){
  const stations=data.stations||[];
  const country=data.name||'';
  document.getElementById('sh-city').textContent=`${country} 방송국 ${stations.length}개`;
  currentStations=stations;
  const body=document.getElementById('sh-body');
  body.innerHTML='';
  stations.slice(0,20).forEach((s,i)=>{
    const isFav=favorites.some(f=>f.url===s.url_resolved);
    const isPlaying=stIdx===i&&document.getElementById('play-btn').textContent==='⏸';
    const d=document.createElement('div');
    d.className='sitem'+(isPlaying?' playing':'');
    d.innerHTML=`
      <div class="si-info">
        <div class="si-name">${s.name}</div>
        <div class="si-meta">${[s.codec,s.bitrate?s.bitrate+'kbps':'',s.language].filter(Boolean).join(' · ')||'—'}</div>
      </div>
      <span class="si-heart${isFav?' loved':''}" data-idx="${i}">${isFav?'❤️':'🤍'}</span>
    `;
    d.querySelector('.si-heart').onclick=e=>{e.stopPropagation();toggleFav(s,e.target);};
    d.onclick=()=>{stIdx=i;closeSheet();playStation(s);
      // 패널 업데이트
      document.getElementById('city-name').textContent=country;
      document.getElementById('city-country').textContent=s.country||'';
      updateLocalTime(data.lat,data.lon);
    };
    body.appendChild(d);
  });
  document.getElementById('sheet-overlay').classList.add('open');
}

function updateLocalTime(lat,lon){
  // 간단한 시간대 추정 (경도 기반)
  const offsetH=Math.round(lon/15);
  const now=new Date();
  const utc=now.getTime()+now.getTimezoneOffset()*60000;
  const local=new Date(utc+offsetH*3600000);
  const h=String(local.getHours()).padStart(2,'0');
  const m=String(local.getMinutes()).padStart(2,'0');
  document.getElementById('local-time').textContent=h+':'+m;
}

function toggleFav(s,el){
  const idx=favorites.findIndex(f=>f.url===s.url_resolved);
  if(idx>=0){favorites.splice(idx,1);el.textContent='🤍';el.classList.remove('loved');}
  else{favorites.push({name:s.name,url:s.url_resolved,country:s.country,city:document.getElementById('city-name').textContent});el.textContent='❤️';el.classList.add('loved');}
  localStorage.setItem('wp_favorites',JSON.stringify(favorites));
  renderFavPanel();
}

function renderFavPanel(){
  const body=document.getElementById('fav-body');
  if(!favorites.length){body.innerHTML='<div id="fav-empty">즐겨찾기한 방송국이 없어요<br>방송국 목록에서 🤍를 눌러보세요!</div>';return;}
  body.innerHTML='';
  favorites.forEach((f,i)=>{
    const d=document.createElement('div');d.className='fitem';
    d.innerHTML=`<div class="fi-info"><div class="fi-name">${f.name}</div><div class="fi-loc">${f.city||''}, ${f.country||''}</div></div><span class="fi-del" data-i="${i}">✕</span>`;
    d.querySelector('.fi-del').onclick=e=>{e.stopPropagation();favorites.splice(i,1);localStorage.setItem('wp_favorites',JSON.stringify(favorites));renderFavPanel();};
    d.onclick=()=>playStation(f);
    body.appendChild(d);
  });
}

const aud=document.getElementById('aud');
let playing=false,muted=false;
function setStatus(m,c=''){const el=document.getElementById('status');el.textContent=m;el.className=c;}
function showEq(on){document.getElementById('eq').className=on?'on':'';}

function playStation(s){
  const url=s.url_resolved||s.url;
  if(!url)return;
  aud.pause();aud.src=url;aud.load();
  document.getElementById('freq-name').textContent=s.name;
  document.getElementById('freq-loc').textContent=s.country||'';
  setStatus('연결 중…','on');
  document.getElementById('play-btn').textContent='⏸';
  aud.play()
    .then(()=>{playing=true;setStatus('재생 중 ♪','on');showEq(true);})
    .catch(()=>{setStatus('오류 — ⏭ 다음 시도','er');document.getElementById('play-btn').textContent='▶';showEq(false);});
}
function stopAudio(){aud.pause();aud.src='';playing=false;document.getElementById('play-btn').textContent='▶';showEq(false);setStatus('');}
aud.addEventListener('error',()=>{setStatus('스트림 오류','er');showEq(false);document.getElementById('play-btn').textContent='▶';playing=false;});

document.getElementById('play-btn').onclick=()=>{
  if(!aud.src||aud.src===location.href)return;
  if(playing){aud.pause();playing=false;document.getElementById('play-btn').textContent='▶';showEq(false);setStatus('일시정지');}
  else{aud.play();playing=true;document.getElementById('play-btn').textContent='⏸';showEq(true);setStatus('재생 중 ♪','on');}
};
document.getElementById('next-btn').onclick=()=>{
  if(!currentStations.length)return;
  stIdx=(stIdx+1)%currentStations.length;
  playStation(currentStations[stIdx]);
};
document.getElementById('mute-btn').onclick=()=>{muted=!muted;aud.muted=muted;document.getElementById('mute-btn').textContent=muted?'🔇':'🔊';};

// ══════════════════════════════════════════
//  스플래시 → 지구본
// ══════════════════════════════════════════
setTimeout(()=>{
  document.getElementById('splash').classList.add('hide');
  document.getElementById('loading').classList.add('hide');
  camera.position.z=10; zDist=10;
  navigator.geolocation&&navigator.geolocation.getCurrentPosition(
    pos=>{
      const lat=pos.coords.latitude,lon=pos.coords.longitude;
      flyTo(lat,lon,1.15)
      setTimeout(()=>{
        const nearby=allStations.filter(s=>{
          if(!s.geo_lat||!s.geo_long)return false;
          return Math.hypot(s.geo_lat-lat,s.geo_long-lon)<5;
        });
        if(nearby.length){
          const s=nearby[0];
          document.getElementById('city-name').textContent=s.country||'';
          playStation(s);
          updateLocalTime(lat,lon);
        }
      },3000);
    },
    ()=>{flyTo(37.57,126.98,2.2);},
    {timeout:3000}
  );
  loadAllStations();
},2500);
</script>
