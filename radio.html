<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Wild Peaks Radio</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{--bg:#05080f;--green:#4dff91;--green-dim:rgba(77,255,145,0.12);--panel:#0c1320;--panel2:#111b2b;--text:#e8f0fe;--sub:#5a6e8a;--border:rgba(77,255,145,0.1);--red:#ff4d7e;}
html,body{height:100%;overflow:hidden;background:var(--bg);}
body{color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;user-select:none;-webkit-user-select:none;}
#stars{position:fixed;inset:0;z-index:0;pointer-events:none;}

/* SPLASH */
#splash{position:fixed;inset:0;z-index:1000;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;transition:opacity 1s ease;}
#splash.out{opacity:0;pointer-events:none;}
.sp-logo-img{width:80px;height:80px;object-fit:contain;}
.sp-brand{font-size:32px;font-weight:900;letter-spacing:-1px;background:linear-gradient(135deg,#fff 0%,var(--green) 70%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.sp-tag{font-size:11px;letter-spacing:5px;color:var(--sub);text-transform:uppercase;}
.sp-bar{width:120px;height:2px;background:rgba(255,255,255,0.06);border-radius:1px;margin-top:28px;overflow:hidden;}
.sp-bar-fill{height:100%;width:0;background:var(--green);border-radius:1px;animation:spLoad 2s 0.3s ease forwards;}
@keyframes spLoad{to{width:100%}}

/* APP */
#app{position:fixed;inset:0;z-index:1;display:flex;flex-direction:column;}
#globe-wrap{flex:1;position:relative;overflow:hidden;cursor:grab;touch-action:none;}
#globe-wrap:active{cursor:grabbing;}
#globe-canvas{display:block;width:100%;height:100%;}

/* SIDE BUTTONS */
#side-btns{position:absolute;right:14px;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;gap:9px;z-index:10;}
.sbtn{width:42px;height:42px;border-radius:50%;background:rgba(12,19,32,0.82);border:1px solid var(--border);backdrop-filter:blur(12px);display:flex;align-items:center;justify-content:center;font-size:17px;cursor:pointer;transition:all 0.18s;}
.sbtn:hover{background:var(--green-dim);border-color:rgba(77,255,145,0.4);}

/* LOCK BADGE */
#lock-badge{position:absolute;top:14px;left:50%;transform:translateX(-50%);background:rgba(12,19,32,0.88);border:1px solid rgba(77,255,145,0.35);border-radius:20px;padding:4px 14px;font-size:10px;color:var(--green);letter-spacing:2px;pointer-events:none;z-index:10;display:none;}
#lock-badge.show{display:block;}

/* SELECTOR RING (CSS overlay) */
#selector-ring{
  position:absolute;pointer-events:none;z-index:8;
  width:48px;height:48px;margin-left:-24px;margin-top:-24px;
  border:2px dashed rgba(255,255,255,0.85);border-radius:50%;
  display:none;
  animation:ringPulse 1.2s ease-in-out infinite;
}
#selector-ring.show{display:block;}
@keyframes ringPulse{0%,100%{transform:scale(1);opacity:0.9;}50%{transform:scale(1.15);opacity:0.5;}}

/* LOADING */
#loading-ring{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);display:none;z-index:5;text-align:center;}
#loading-ring.show{display:block;}
.ring{width:36px;height:36px;border:2px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin 0.9s linear infinite;margin:0 auto 8px;}
.ring-txt{font-size:10px;letter-spacing:2px;color:var(--sub);}
@keyframes spin{to{transform:rotate(360deg)}}

/* PLAYER */
#player{background:var(--panel);border-top:1px solid var(--border);padding:11px 16px 8px;flex-shrink:0;cursor:pointer;}
.p-brand{font-size:8px;letter-spacing:3.5px;color:var(--sub);text-transform:uppercase;margin-bottom:8px;}
.p-info{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;}
.p-left .p-city{font-size:15px;font-weight:700;}
.p-left .p-country{font-size:10px;color:var(--sub);margin-top:2px;}
.p-right{text-align:right;}
.p-time{font-size:14px;font-weight:600;color:var(--green);font-variant-numeric:tabular-nums;}
.p-station{font-size:11px;color:var(--sub);margin-top:2px;max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.p-controls{display:flex;align-items:center;gap:8px;}
.eq{display:flex;align-items:flex-end;gap:2px;height:18px;flex:1;}
.eq-b{width:3px;background:var(--green);border-radius:2px;animation:eq 0.55s infinite alternate ease-in-out;}
.eq-b:nth-child(1){animation-duration:0.5s;}
.eq-b:nth-child(2){animation-duration:0.7s;animation-delay:0.1s;}
.eq-b:nth-child(3){animation-duration:0.45s;animation-delay:0.05s;}
.eq-b:nth-child(4){animation-duration:0.65s;animation-delay:0.15s;}
.eq-b:nth-child(5){animation-duration:0.6s;animation-delay:0.2s;}
.eq.paused .eq-b{animation-play-state:paused;height:4px;opacity:0.3;}
@keyframes eq{from{height:3px}to{height:17px}}
.cbtn{width:38px;height:38px;border-radius:50%;background:none;border:1px solid var(--border);color:var(--text);font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.18s;flex-shrink:0;}
.cbtn:hover{border-color:rgba(77,255,145,0.4);color:var(--green);}
.cbtn.play-btn{background:var(--green);color:#000;border-color:var(--green);font-size:17px;}

/* NAV */
#nav{background:var(--panel);border-top:1px solid var(--border);display:flex;flex-shrink:0;}
.nbtn{flex:1;padding:9px 2px 7px;display:flex;flex-direction:column;align-items:center;gap:2px;background:none;border:none;color:var(--sub);cursor:pointer;font-size:9.5px;transition:color 0.18s;}
.nbtn .ni{font-size:20px;line-height:1;}
.nbtn.on{color:var(--green);}

/* SHEET */
#sheet{position:fixed;bottom:0;left:0;right:0;z-index:80;background:var(--panel);border-radius:20px 20px 0 0;border-top:1px solid var(--border);transform:translateY(100%);transition:transform 0.36s cubic-bezier(0.32,0.72,0,1);max-height:75vh;display:flex;flex-direction:column;box-shadow:0 -8px 40px rgba(0,0,0,0.6);}
#sheet.open{transform:translateY(0);}
.sh-handle{width:38px;height:4px;background:rgba(255,255,255,0.15);border-radius:2px;margin:10px auto 0;flex-shrink:0;cursor:pointer;}
.sh-head{padding:12px 16px;flex-shrink:0;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.sh-city{font-size:18px;font-weight:800;}
.sh-meta{font-size:11px;color:var(--sub);margin-top:2px;}
.sh-time{font-size:16px;font-weight:700;color:var(--green);}
.sh-close{font-size:20px;color:var(--sub);cursor:pointer;padding:4px;}
.sh-list{overflow-y:auto;flex:1;padding-bottom:16px;}
.sh-section{padding:12px 16px 6px;font-size:11px;letter-spacing:1px;color:var(--sub);text-transform:uppercase;}
.sh-see-all{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;color:var(--green);font-size:13px;cursor:pointer;border-top:1px solid var(--border);}

/* STATION ITEM */
.si{display:flex;align-items:center;padding:13px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:background 0.13s;gap:12px;}
.si:active,.si:hover{background:var(--green-dim);}
.si.playing{background:rgba(77,255,145,0.07);}
.si-dot{width:8px;height:8px;border-radius:50%;background:var(--sub);flex-shrink:0;}
.si-dot.on{background:var(--green);box-shadow:0 0 6px var(--green);}
.si-body{flex:1;min-width:0;}
.si-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.si-meta{font-size:10px;color:var(--sub);margin-top:2px;}
.si-heart{font-size:19px;cursor:pointer;flex-shrink:0;color:var(--sub);transition:all 0.18s;padding:4px;}
.si-heart.on{color:var(--red);}

/* TABS */
.tab{position:fixed;inset:0;z-index:60;background:var(--bg);flex-direction:column;display:none;}
.tab.open{display:flex;}
.tab-hd{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;flex-shrink:0;background:var(--panel);}
.tab-back{background:none;border:none;color:var(--green);font-size:26px;cursor:pointer;line-height:1;padding:0;}
.tab-ttl{font-size:17px;font-weight:700;}
.tab-body{flex:1;overflow-y:auto;padding:16px;}
.sinput{width:100%;background:var(--panel2);border:1px solid var(--border);border-radius:12px;padding:12px 16px;color:var(--text);font-size:15px;outline:none;margin-bottom:14px;}
.sinput::placeholder{color:var(--sub);}
.sinput:focus{border-color:rgba(77,255,145,0.4);}
.fav-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:60vh;gap:10px;color:var(--sub);text-align:center;}
.fav-empty .icon{font-size:52px;}
.set-sec{margin-bottom:22px;}
.set-lbl{font-size:10px;letter-spacing:2px;color:var(--sub);text-transform:uppercase;margin-bottom:10px;}
.lang-grid{display:flex;flex-wrap:wrap;gap:7px;}
.lbtn{padding:6px 12px;border-radius:20px;background:var(--panel2);border:1px solid var(--border);color:var(--text);font-size:12px;cursor:pointer;}
.lbtn.on{background:var(--green-dim);border-color:rgba(77,255,145,0.4);color:var(--green);}
.szrow{display:flex;gap:8px;}
.szbtn{flex:1;padding:10px;border-radius:10px;background:var(--panel2);border:1px solid var(--border);color:var(--text);font-size:12px;cursor:pointer;text-align:center;}
.szbtn.on{background:var(--green-dim);border-color:rgba(77,255,145,0.4);color:var(--green);}
.about{background:var(--panel2);border:1px solid var(--border);border-radius:12px;padding:16px;font-size:12px;color:var(--sub);line-height:1.8;}
.about strong{color:var(--text);}
.live-cnt{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;color:var(--sub);padding:20px;}
.live-cnt .big{font-size:60px;}
.live-cnt h2{font-size:20px;font-weight:700;color:var(--text);}
.live-cnt p{font-size:13px;text-align:center;line-height:1.7;max-width:240px;}
.yt-btn{padding:11px 22px;border-radius:22px;background:var(--green);color:#000;font-size:13px;font-weight:700;border:none;cursor:pointer;text-decoration:none;display:inline-block;}

/* TOAST */
#toast{position:fixed;bottom:150px;left:50%;transform:translateX(-50%) translateY(12px);background:rgba(12,19,32,0.94);border:1px solid var(--border);border-radius:22px;padding:9px 20px;font-size:12px;color:var(--text);pointer-events:none;opacity:0;transition:all 0.28s;z-index:500;white-space:nowrap;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
::-webkit-scrollbar{width:2px;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:1px;}
@media(min-width:520px){#sheet{max-width:460px;left:50%;transform:translateX(-50%) translateY(100%);}#sheet.open{transform:translateX(-50%) translateY(0);}}
</style>
</head>
<body>
<canvas id="stars"></canvas>
<div id="splash">
  <img class="sp-logo-img" src="/logo.png" alt="" onerror="this.style.display='none'">
  <div class="sp-brand">Wild Peaks</div>
  <div class="sp-tag">Radio</div>
  <div class="sp-bar"><div class="sp-bar-fill"></div></div>
</div>
<div id="toast"></div>
<div id="lock-badge">🔒 LOCKED</div>
<div id="selector-ring"></div>
<div id="app">
  <div id="globe-wrap">
    <canvas id="globe-canvas"></canvas>
    <div id="loading-ring"><div class="ring"></div><div class="ring-txt">Loading</div></div>
    <div id="side-btns">
      <div class="sbtn" onclick="gotoMyLocation()">📍</div>
      <div class="sbtn" onclick="shareStation()">🔗</div>
      <div class="sbtn" id="btn-lock" onclick="toggleLock()">🔓</div>
    </div>
  </div>
  <div id="player" onclick="onPlayerTap()">
    <div class="p-brand">Wild Peaks Radio</div>
    <div class="p-info">
      <div class="p-left">
        <div class="p-city" id="p-city">지구를 탐색하세요</div>
        <div class="p-country" id="p-country">녹색 점을 탭하면 방송국 목록이 열립니다</div>
      </div>
      <div class="p-right">
        <div class="p-time" id="p-time">--:--</div>
        <div class="p-station" id="p-station">방송국 없음</div>
      </div>
    </div>
    <div class="p-controls" onclick="function(e){e.stopPropagation()}" style="pointer-events:auto">
      <button class="cbtn" id="btn-mute" onclick="event.stopPropagation();toggleMute()">🔊</button>
      <div class="eq paused" id="eq">
        <div class="eq-b"></div><div class="eq-b"></div><div class="eq-b"></div><div class="eq-b"></div><div class="eq-b"></div>
      </div>
      <button class="cbtn play-btn" id="btn-play" onclick="event.stopPropagation();togglePlay()">▶</button>
      <button class="cbtn" onclick="event.stopPropagation();nextStation()">⏭</button>
    </div>
  </div>
  <div id="nav">
    <button class="nbtn on" data-t="globe" onclick="switchTab('globe')"><span class="ni">🌍</span>탐색</button>
    <button class="nbtn" data-t="fav" onclick="switchTab('fav')"><span class="ni">♡</span>즐겨찾기</button>
    <button class="nbtn" data-t="live" onclick="switchTab('live')"><span class="ni">🔴</span>라이브</button>
    <button class="nbtn" data-t="search" onclick="switchTab('search')"><span class="ni">🔍</span>검색</button>
    <button class="nbtn" data-t="settings" onclick="switchTab('settings')"><span class="ni">☰</span>설정</button>
  </div>
</div>

<!-- SHEET -->
<div id="sheet">
  <div class="sh-handle" onclick="closeSheet()"></div>
  <div class="sh-head">
    <div>
      <div class="sh-city" id="sh-city">방송국</div>
      <div class="sh-meta" id="sh-meta"></div>
    </div>
    <div style="display:flex;align-items:center;gap:12px;">
      <div class="sh-time" id="sh-time"></div>
      <div class="sh-close" onclick="closeSheet()">✕</div>
    </div>
  </div>
  <div class="sh-list" id="sh-list"></div>
</div>

<!-- TABS -->
<div class="tab" id="tab-fav">
  <div class="tab-hd"><button class="tab-back" onclick="closeTab('fav')">‹</button><div class="tab-ttl">즐겨찾기</div></div>
  <div class="tab-body" id="fav-body"></div>
</div>
<div class="tab" id="tab-live">
  <div class="tab-hd"><button class="tab-back" onclick="closeTab('live')">‹</button><div class="tab-ttl">라이브</div></div>
  <div class="live-cnt">
    <div class="big">📡</div><h2>Coming Soon</h2>
    <p>YouTube 라이브 연동이 곧 추가됩니다!</p>
    <a class="yt-btn" href="https://youtube.com/@wildpeaks-wp" target="_blank">▶ Wild Peaks YouTube</a>
  </div>
</div>
<div class="tab" id="tab-search">
  <div class="tab-hd"><button class="tab-back" onclick="closeTab('search')">‹</button><div class="tab-ttl">검색</div></div>
  <div class="tab-body">
    <input class="sinput" id="search-input" placeholder="방송국 또는 도시명 검색…" oninput="doSearch(this.value)">
    <div id="search-results"></div>
  </div>
</div>
<div class="tab" id="tab-settings">
  <div class="tab-hd"><button class="tab-back" onclick="closeTab('settings')">‹</button><div class="tab-ttl">설정</div></div>
  <div class="tab-body">
    <div class="set-sec"><div class="set-lbl">언어</div><div class="lang-grid" id="lang-grid"></div></div>
    <div class="set-sec">
      <div class="set-lbl">지구본 점 크기</div>
      <div class="szrow">
        <button class="szbtn" data-s="sm" onclick="setDotSize('sm')">작게</button>
        <button class="szbtn on" data-s="md" onclick="setDotSize('md')">보통</button>
        <button class="szbtn" data-s="lg" onclick="setDotSize('lg')">크게</button>
      </div>
    </div>
    <div class="set-sec">
      <div class="set-lbl">정보</div>
      <div class="about"><strong>Wild Peaks Radio v2.0</strong><br>전 세계 라디오 방송국을 지구본에서 탐색하세요.<br><br>데이터: <strong>radio-browser.info</strong><br>3D: <strong>Three.js r128</strong></div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
var ST={
  stations:[],clusters:[],dots:[],current:null,currentCluster:null,sheetList:[],nearbyList:[],
  favs:JSON.parse(localStorage.getItem('wp_favs')||'[]'),
  playing:false,muted:false,locked:false,
  dotSize:localStorage.getItem('wp_dotsize')||'md',
  lang:localStorage.getItem('wp_lang')||'auto',
  myLat:37.5665,myLon:126.9780,hasGPS:false,timerId:null,sheetTimerId:null,
  selectedDot:null
};

/* STARS */
(function(){
  var c=document.getElementById('stars'),ctx=c.getContext('2d'),stars=[];
  function resize(){c.width=innerWidth;c.height=innerHeight;}
  resize();window.addEventListener('resize',resize);
  for(var i=0;i<180;i++)stars.push({x:Math.random(),y:Math.random(),r:Math.random()*1.1+0.2,a:Math.random(),da:(Math.random()-0.5)*0.006});
  function draw(){
    ctx.clearRect(0,0,c.width,c.height);
    for(var i=0;i<stars.length;i++){
      var s=stars[i];s.a+=s.da;if(s.a<0||s.a>1)s.da*=-1;
      ctx.beginPath();ctx.arc(s.x*c.width,s.y*c.height,s.r,0,Math.PI*2);
      ctx.fillStyle='rgba(255,255,255,'+(0.2+s.a*0.55)+')';ctx.fill();
    }
    requestAnimationFrame(draw);
  }
  draw();
})();

/* THREE */
var scene,cam,ren,globe,atmo;
var drag=false,dragMoved=false,pMouse={x:0,y:0};
var vel={x:0,y:0},autoRot=true,zoomTarget=null,pinch0=null;
var ray=new THREE.Raycaster(),mXY=new THREE.Vector2();

function initGlobe(){
  var wrap=document.getElementById('globe-wrap'),cv=document.getElementById('globe-canvas');
  var W=wrap.clientWidth,H=wrap.clientHeight;
  scene=new THREE.Scene();
  cam=new THREE.PerspectiveCamera(45,W/H,0.1,1000);
  cam.position.z=3.8;
  ren=new THREE.WebGLRenderer({canvas:cv,antialias:true,alpha:true});
  ren.setPixelRatio(Math.min(devicePixelRatio,2));
  ren.setSize(W,H);
  ren.setClearColor(0x000000,0);
  var tex=new THREE.TextureLoader().load('/earth.jpg');
  globe=new THREE.Mesh(
    new THREE.SphereGeometry(1,64,64),
    new THREE.MeshPhongMaterial({map:tex,specular:new THREE.Color(0x1a2244),shininess:6})
  );
  scene.add(globe);
  atmo=new THREE.Mesh(new THREE.SphereGeometry(1.045,64,64),new THREE.ShaderMaterial({
    vertexShader:'varying vec3 vN;void main(){vN=normalize(normalMatrix*normal);gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);}',
    fragmentShader:'varying vec3 vN;void main(){float i=pow(0.55-dot(vN,vec3(0,0,1)),2.0);gl_FragColor=vec4(0.15,0.45,1.0,1.0)*i*0.9;}',
    side:THREE.FrontSide,blending:THREE.AdditiveBlending,transparent:true
  }));
  scene.add(atmo);
  scene.add(new THREE.AmbientLight(0xffffff,0.45));
  var sun=new THREE.DirectionalLight(0xffffff,1.0);sun.position.set(5,3,5);scene.add(sun);
  window.addEventListener('resize',function(){
    var W2=wrap.clientWidth,H2=wrap.clientHeight;
    cam.aspect=W2/H2;cam.updateProjectionMatrix();ren.setSize(W2,H2);
  });
  cv.addEventListener('mousedown',onMD);
  window.addEventListener('mousemove',onMM);
  window.addEventListener('mouseup',onMU);
  cv.addEventListener('wheel',onWH,{passive:false});
  cv.addEventListener('touchstart',onTS,{passive:false});
  cv.addEventListener('touchmove',onTM,{passive:false});
  cv.addEventListener('touchend',onTE,{passive:false});
  loop();
}

function loop(){
  requestAnimationFrame(loop);
  if(!drag){
    globe.rotation.x+=vel.x;globe.rotation.y+=vel.y;
    vel.x*=0.93;vel.y*=0.93;
    if(autoRot)globe.rotation.y+=0.0007;
    atmo.rotation.copy(globe.rotation);
  }
  if(zoomTarget!==null){
    cam.position.z+=(zoomTarget-cam.position.z)*0.055;
    if(Math.abs(cam.position.z-zoomTarget)<0.005){cam.position.z=zoomTarget;zoomTarget=null;}
  }
  ren.render(scene,cam);
}

function onMD(e){drag=true;dragMoved=false;pMouse={x:e.clientX,y:e.clientY};autoRot=false;vel={x:0,y:0};}
function onMM(e){
  if(!drag)return;
  var dx=e.clientX-pMouse.x,dy=e.clientY-pMouse.y;
  if(Math.abs(dx)>2||Math.abs(dy)>2)dragMoved=true;
  globe.rotation.y+=dx*0.005;globe.rotation.x+=dy*0.005;
  atmo.rotation.copy(globe.rotation);
  vel.x=dy*0.005;vel.y=dx*0.005;
  pMouse={x:e.clientX,y:e.clientY};
}
function onMU(e){if(!dragMoved)handleTap(e.clientX,e.clientY);drag=false;}
function onWH(e){e.preventDefault();cam.position.z=Math.max(1.2,Math.min(8,cam.position.z+e.deltaY*0.003));}
function onTS(e){
  if(e.touches.length===2){pinch0=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);}
  else{drag=true;dragMoved=false;pMouse={x:e.touches[0].clientX,y:e.touches[0].clientY};autoRot=false;vel={x:0,y:0};}
}
function onTM(e){
  e.preventDefault();
  if(e.touches.length===2&&pinch0!==null){
    var d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    cam.position.z=Math.max(1.2,Math.min(8,cam.position.z-(d-pinch0)*0.01));pinch0=d;
  }else if(drag){
    var dx=e.touches[0].clientX-pMouse.x,dy=e.touches[0].clientY-pMouse.y;
    if(Math.abs(dx)>3||Math.abs(dy)>3)dragMoved=true;
    globe.rotation.y+=dx*0.005;globe.rotation.x+=dy*0.005;
    atmo.rotation.copy(globe.rotation);vel.x=dy*0.005;vel.y=dx*0.005;
    pMouse={x:e.touches[0].clientX,y:e.touches[0].clientY};
  }
}
function onTE(e){
  if(e.touches.length<2)pinch0=null;
  drag=false;
  if(!dragMoved){var t=e.changedTouches[0];handleTap(t.clientX,t.clientY);}
}

function handleTap(cx,cy){
  var sheet=document.getElementById('sheet');
  if(sheet.classList.contains('open')){closeSheet();return;}
  var rect=ren.domElement.getBoundingClientRect();
  mXY.x=((cx-rect.left)/rect.width)*2-1;
  mXY.y=-((cy-rect.top)/rect.height)*2+1;
  ray.setFromCamera(mXY,cam);
  var hits=ray.intersectObjects(ST.dots);
  if(hits.length){
    var cl=hits[0].object.userData.cluster;
    showSelectorRing(cx,cy);
    if(ST.locked){
      openSheet(cl);
    } else {
      openSheet(cl);
      if(cl.stations.length>0)play(cl.stations[0]);
    }
  }
}

/* GLOBE UTILS */
function ll2v(lat,lon,r){
  r=r||1.0;
  var phi=(90-lat)*Math.PI/180,th=(lon+180)*Math.PI/180;
  return new THREE.Vector3(-r*Math.sin(phi)*Math.cos(th),r*Math.cos(phi),r*Math.sin(phi)*Math.sin(th));
}

function buildDots(){
  for(var i=0;i<ST.dots.length;i++)globe.remove(ST.dots[i]);
  ST.dots=[];
  var dotR={sm:0.006,md:0.009,lg:0.014}[ST.dotSize]||0.009;
  for(var i=0;i<ST.clusters.length;i++){
    var cl=ST.clusters[i];
    var geo=new THREE.SphereGeometry(dotR,5,5);
    var mat=new THREE.MeshBasicMaterial({color:0x4dff91});
    var m=new THREE.Mesh(geo,mat);
    var pos=ll2v(cl.lat,cl.lon,1.018);
    m.position.set(pos.x,pos.y,pos.z);
    m.userData={cluster:cl};
    globe.add(m);
    ST.dots.push(m);
  }
}

function flyTo(lat,lon,zoom){
  zoom=zoom||2.0;
  var targetY=-(lon+180)*Math.PI/180+Math.PI,targetX=lat*Math.PI/180*0.4;
  var sy=globe.rotation.y,sx=globe.rotation.x,t=0;
  autoRot=false;
  function step(){
    t+=0.03;var e=1-Math.pow(1-Math.min(t,1),3);
    globe.rotation.y=sy+(targetY-sy)*e;
    globe.rotation.x=sx+(targetX-sx)*e;
    atmo.rotation.copy(globe.rotation);
    if(t<1)requestAnimationFrame(step);
  }
  step();
  zoomTarget=zoom;
}

function clusterStations(stations){
  var THR=1.4,cls=[];
  for(var i=0;i<stations.length;i++){
    var s=stations[i];
    if(isNaN(s.lat)||isNaN(s.lon))continue;
    var found=null;
    for(var j=0;j<cls.length;j++){if(Math.hypot(cls[j].lat-s.lat,cls[j].lon-s.lon)<THR){found=cls[j];break;}}
    if(found)found.stations.push(s);
    else cls.push({lat:s.lat,lon:s.lon,stations:[s],country:s.country});
  }
  return cls;
}

/* API */
var apiBase='https://de1.api.radio-browser.info';

function loadStations(){
  setLoading(true);
  var controller=new AbortController();
  var tid=setTimeout(function(){controller.abort();},25000);
  fetch(apiBase+'/json/stations?limit=3000&hidebroken=true&has_geo_info=true&order=clickcount&reverse=true',{signal:controller.signal})
  .then(function(res){clearTimeout(tid);if(!res.ok)throw new Error();return res.json();})
  .then(function(data){onStationsLoaded(data);})
  .catch(function(){
    clearTimeout(tid);
    fetch('https://nl1.api.radio-browser.info/json/stations?limit=3000&hidebroken=true&has_geo_info=true&order=clickcount&reverse=true')
    .then(function(r){return r.json();})
    .then(function(data){onStationsLoaded(data);})
    .catch(function(){setLoading(false);showToast('⚠️ API 연결 실패');});
  });
}

function onStationsLoaded(data){
  ST.stations=[];
  for(var i=0;i<data.length;i++){
    var s=data[i];
    if(!s.geo_lat||!s.geo_long)continue;
    ST.stations.push({
      name:(s.name||'').trim()||'Unknown',url:s.url_resolved||s.url,
      lat:parseFloat(s.geo_lat),lon:parseFloat(s.geo_long),
      country:s.country||'',state:s.state||'',
      codec:s.codec||'',bitrate:parseInt(s.bitrate)||0,uuid:s.stationuuid||''
    });
  }
  ST.clusters=clusterStations(ST.stations);
  buildDots();setLoading(false);
  showToast('🌍 '+ST.stations.length.toLocaleString()+'개 방송국 로드 완료');
  autoPlayNearby();
}

function autoPlayNearby(){
  if(!ST.hasGPS)return;
  var best=null,bestD=999;
  for(var i=0;i<ST.clusters.length;i++){
    var cl=ST.clusters[i];
    var d=Math.hypot(cl.lat-ST.myLat,cl.lon-ST.myLon);
    if(d<bestD){bestD=d;best=cl;}
  }
  if(best&&best.stations.length>0){
    ST.currentCluster=best;
    play(best.stations[0]);
    openSheet(best);
  }
}

function renderSheetList(cl){
  var ul=document.getElementById('sh-list');
  ul.innerHTML='';

  /* 해당 도시 방송국 */
  var secA=document.createElement('div');
  secA.className='sh-section';
  secA.textContent=(cl.country||'방송국')+' 방송국';
  ul.appendChild(secA);

  var showAll=false;
  var list=cl.stations;
  var maxShow=showAll?list.length:Math.min(5,list.length);
  for(var i=0;i<maxShow;i++)ul.appendChild(makeItem(list[i],i,'sheet'));

  if(list.length>5){
    var seeAll=document.createElement('div');
    seeAll.className='sh-see-all';
    seeAll.innerHTML='전체 '+list.length+'개 방송국 보기 <span>›</span>';
    (function(l){
      seeAll.onclick=function(){
        ul.innerHTML='';
        var secA2=document.createElement('div');secA2.className='sh-section';
        secA2.textContent=(cl.country||'방송국')+' 방송국';ul.appendChild(secA2);
        for(var i=0;i<l.length;i++)ul.appendChild(makeItem(l[i],i,'sheet'));
        renderNearby(cl,ul);
      };
    })(list);
    ul.appendChild(seeAll);
  }

  renderNearby(cl,ul);
}

function renderNearby(cl,ul){
  /* 주변 방송국 */
  var nearby=[];
  for(var i=0;i<ST.clusters.length;i++){
    var c=ST.clusters[i];
    if(c===cl)continue;
    var d=Math.hypot(c.lat-cl.lat,c.lon-cl.lon);
    if(d<15)nearby.push({cl:c,d:d});
  }
  nearby.sort(function(a,b){return a.d-b.d;});
  nearby=nearby.slice(0,8);
  if(!nearby.length)return;

  var secB=document.createElement('div');
  secB.className='sh-section';
  secB.textContent='주변 지역 방송국';
  ul.appendChild(secB);

  for(var i=0;i<nearby.length;i++){
    var nc=nearby[i].cl;
    if(nc.stations.length>0){
      var s=nc.stations[0];
      var div=document.createElement('div');
      div.className='si';
      var isFav=ST.favs.some(function(f){return f.uuid===s.uuid;});
      div.innerHTML='<div class="si-dot'+(ST.current&&ST.current.uuid===s.uuid?' on':'')+'"></div>'+
        '<div class="si-body"><div class="si-name">'+esc(s.name)+'</div>'+
        '<div class="si-meta">'+(nc.country||'')+' · '+nc.stations.length+'개 방송국</div></div>'+
        '<div class="si-heart'+(isFav?' on':'')+'" onclick="tapHeartDirect(event,\''+s.uuid+'\')">'+(isFav?'♥':'♡')+'</div>';
      (function(cluster,station){
        div.addEventListener('click',function(e){
          if(e.target.classList.contains('si-heart'))return;
          openSheet(cluster);
          play(station);
        });
      })(nc,s);
      ul.appendChild(div);
    }
  }
}

function tapHeartDirect(e,uuid){
  e.stopPropagation();
  var s=null;
  for(var i=0;i<ST.stations.length;i++){if(ST.stations[i].uuid===uuid){s=ST.stations[i];break;}}
  if(!s)return;
  var fi=ST.favs.findIndex(function(f){return f.uuid===uuid;});
  if(fi>=0){ST.favs.splice(fi,1);showToast('즐겨찾기 삭제');}
  else{ST.favs.push(s);showToast('♥ 즐겨찾기 추가');}
  localStorage.setItem('wp_favs',JSON.stringify(ST.favs));
  if(ST.currentCluster)renderSheetList(ST.currentCluster);
  renderFav();
}

function makeItem(s,i,ctx){
  var div=document.createElement('div');
  div.className='si'+(ST.current&&ST.current.uuid===s.uuid?' playing':'');
  var isFav=false;for(var j=0;j<ST.favs.length;j++){if(ST.favs[j].uuid===s.uuid){isFav=true;break;}}
  var isPlay=ST.current&&ST.current.uuid===s.uuid;
  div.innerHTML='<div class="si-dot'+(isPlay?' on':'')+'"></div>'+
    '<div class="si-body"><div class="si-name">'+esc(s.name)+'</div>'+
    '<div class="si-meta">'+(s.codec||'MP3')+(s.bitrate?' · '+s.bitrate+'kbps':'')+' · '+s.country+'</div></div>'+
    '<div class="si-heart'+(isFav?' on':'')+'" onclick="tapHeart(event,'+i+',\''+ctx+'\')">'+(isFav?'♥':'♡')+'</div>';
  div.addEventListener('click',function(e){
    if(e.target.classList.contains('si-heart'))return;
    play(s);
    if(ST.currentCluster)renderSheetList(ST.currentCluster);
    renderFav();
  });
  return div;
}

function tapHeart(e,idx,ctx){
  e.stopPropagation();
  var list=ctx==='fav'?ST.favs:ST.sheetList;
  var s=list[idx];if(!s)return;
  var fi=-1;for(var j=0;j<ST.favs.length;j++){if(ST.favs[j].uuid===s.uuid){fi=j;break;}}
  if(fi>=0){ST.favs.splice(fi,1);showToast('즐겨찾기 삭제');}
  else{ST.favs.push(s);showToast('♥ 즐겨찾기 추가');}
  localStorage.setItem('wp_favs',JSON.stringify(ST.favs));
  if(ST.currentCluster)renderSheetList(ST.currentCluster);
  renderFav();
}

function renderFav(){
  var el=document.getElementById('fav-body');
  if(!ST.favs.length){
    el.innerHTML='<div class="fav-empty"><div class="icon">♡</div><div style="font-size:14px;font-weight:600;">즐겨찾기가 없습니다</div><div style="font-size:12px;margin-top:4px;">방송국 옆 ♡를 눌러 추가하세요</div></div>';

var audio=new Audio();audio.crossOrigin='anonymous';
function play(s){
  ST.current=s;audio.src=s.url;audio.muted=ST.muted;
  audio.play().catch(function(){});ST.playing=true;
  document.getElementById('btn-play').textContent='⏸';
  document.getElementById('eq').classList.remove('paused');
  document.getElementById('p-station').textContent=s.name;
  document.getElementById('p-city').textContent=s.country||'Unknown';
  document.getElementById('p-country').textContent=s.state||s.codec||'';
  updateClock(s.lat,s.lon);
  if(s.lat&&s.lon)flyTo(s.lat,s.lon,1.8);
}
function togglePlay(){
  if(!ST.current){
    if(ST.sheetList.length)play(ST.sheetList[0]);
    else if(ST.clusters.length)play(ST.clusters[0].stations[0]);
    return;
  }
  if(ST.playing){
    audio.pause();ST.playing=false;
    document.getElementById('btn-play').textContent='▶';
    document.getElementById('eq').classList.add('paused');
  }else{
    audio.play().catch(function(){});ST.playing=true;
    document.getElementById('btn-play').textContent='⏸';
    document.getElementById('eq').classList.remove('paused');
  }
}
function nextStation(){
  if(!ST.sheetList.length){if(ST.clusters.length)play(ST.clusters[0].stations[0]);return;}
  var idx=-1;for(var i=0;i<ST.sheetList.length;i++){if(ST.current&&ST.sheetList[i].uuid===ST.current.uuid){idx=i;break;}}
  play(ST.sheetList[(idx+1)%ST.sheetList.length]);
}

}

      ST.myLon=pos.coords.longitude;
      ST.hasGPS=true;
      /* 지구 전체 보이다가 GPS 위치로 날아가서 줌인 */
      flyTo(ST.myLat,ST.myLon,1.8);
    },function(){
      /* GPS 실패시 기본 줌 */
      zoomTarget=3.0;
    },{timeout:5000});
  } else {
    zoomTarget=3.0;
  }

  loadStations();
},2000);
</script>
</body>
</html>
