<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Wild Peaks Radio</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{--bg:#05080f;--green:#4dff91;--green-dim:rgba(77,255,145,0.12);--panel:#0c1320;--panel2:#111b2b;--text:#e8f0fe;--sub:#5a6e8a;--border:rgba(77,255,145,0.1);--red:#ff4d7e;}
html,body{height:100%;overflow:hidden;background:var(--bg);}
body{color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;user-select:none;-webkit-user-select:none;}
#stars{position:fixed;inset:0;z-index:0;pointer-events:none;}
#splash{position:fixed;inset:0;z-index:1000;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;transition:opacity 1s ease;cursor:pointer;}
#splash.out{opacity:0;pointer-events:none;}
.sp-logo-img{width:80px;height:80px;object-fit:contain;}
.sp-brand{font-size:32px;font-weight:900;letter-spacing:-1px;background:linear-gradient(135deg,#fff 0%,var(--green) 70%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.sp-tag{font-size:11px;letter-spacing:5px;color:var(--sub);text-transform:uppercase;}
.sp-bar{width:120px;height:2px;background:rgba(255,255,255,0.06);border-radius:1px;margin-top:28px;overflow:hidden;}
.sp-bar-fill{height:100%;width:0;background:var(--green);border-radius:1px;animation:spLoad 2s 0.3s ease forwards;}
@keyframes spLoad{to{width:100%}}
.sp-tap{position:relative;width:104px;height:104px;display:flex;align-items:center;justify-content:center;margin-top:30px;}
.tap-ring{position:absolute;width:48px;height:48px;border:2px solid var(--green);border-radius:50%;opacity:0;animation:tapRing 1.3s ease-out infinite;}
.tap-ring.r2{animation-delay:0.43s;}
.tap-ring.r3{animation-delay:0.86s;}
@keyframes tapRing{
  0%{transform:scale(0.55);opacity:0.8;}
  100%{transform:scale(2.1);opacity:0;}
}
.tap-finger{position:relative;font-size:40px;line-height:1;color:#fff;text-shadow:0 0 14px var(--green);transform-origin:50% 85%;animation:tapPress 1.3s ease-in-out infinite;filter:drop-shadow(0 3px 6px rgba(0,0,0,0.5));}
@keyframes tapPress{
  0%,100%{transform:translateY(0) rotate(0deg);}
  22%{transform:translateY(6px) rotate(-6deg);}
  44%{transform:translateY(0) rotate(0deg);}
}
#app{position:fixed;inset:0;z-index:1;display:flex;flex-direction:column;}
#globe-wrap{flex:1;position:relative;overflow:hidden;cursor:grab;touch-action:none;}
#globe-wrap:active{cursor:grabbing;}
#globe-canvas{display:block;width:100%;height:100%;}
#side-btns{position:absolute;right:14px;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;gap:9px;z-index:10;}
.sbtn{width:42px;height:42px;border-radius:50%;background:rgba(12,19,32,0.82);border:1px solid var(--border);backdrop-filter:blur(12px);display:flex;align-items:center;justify-content:center;font-size:17px;cursor:pointer;transition:all 0.18s;}
.sbtn:hover{background:var(--green-dim);border-color:rgba(77,255,145,0.4);}
#lock-badge{position:absolute;top:14px;left:50%;transform:translateX(-50%);background:rgba(12,19,32,0.88);border:1px solid rgba(77,255,145,0.35);border-radius:20px;padding:4px 14px;font-size:10px;color:var(--green);letter-spacing:2px;pointer-events:none;z-index:10;display:none;}
#lock-badge.show{display:block;}
#center-ring{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:24px;height:24px;border:2px dashed rgba(255,255,255,0.7);border-radius:50%;pointer-events:none;z-index:8;animation:ringPulse 1.8s ease-in-out infinite;opacity:0;transition:opacity 0.8s ease,border-color 0.2s,box-shadow 0.2s;}
#center-ring.visible{opacity:1;}
#loading-ring{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);display:none;z-index:9;text-align:center;}
#loading-ring.show{display:block;}
.ring{width:36px;height:36px;border:2px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin 0.9s linear infinite;margin:0 auto 8px;}
.ring-txt{font-size:10px;letter-spacing:2px;color:#ffffff;}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes ringPulse{0%,100%{opacity:0.8;transform:translate(-50%,-50%) scale(1);}50%{opacity:0.4;transform:translate(-50%,-50%) scale(1.1);}}
#player{background:var(--panel);border-top:1px solid var(--border);padding:11px 16px 8px;flex-shrink:0;cursor:pointer;}
.p-brand{font-size:8px;letter-spacing:3.5px;color:var(--sub);text-transform:uppercase;margin-bottom:8px;}
.p-info{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;}
.p-left .p-city{font-size:15px;font-weight:700;}
.p-left .p-country{font-size:10px;color:var(--sub);margin-top:2px;}
.p-right{text-align:right;}
.p-time{font-size:14px;font-weight:600;color:var(--green);font-variant-numeric:tabular-nums;}
.p-station{font-size:11px;color:var(--sub);margin-top:2px;max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.p-controls{display:flex;align-items:center;gap:8px;}
.eq{display:flex;align-items:flex-end;gap:2px;height:18px;flex:1;}
.eq-b{width:3px;background:var(--green);border-radius:2px;animation:eq 0.55s infinite alternate ease-in-out;}
.eq-b:nth-child(1){animation-duration:0.5s;}
.eq-b:nth-child(2){animation-duration:0.7s;animation-delay:0.1s;}
.eq-b:nth-child(3){animation-duration:0.45s;animation-delay:0.05s;}
.eq-b:nth-child(4){animation-duration:0.65s;animation-delay:0.15s;}
.eq-b:nth-child(5){animation-duration:0.6s;animation-delay:0.2s;}
.eq.paused .eq-b{animation-play-state:paused;height:4px;opacity:0.3;}
@keyframes eq{from{height:3px}to{height:17px}}
.cbtn{width:38px;height:38px;border-radius:50%;background:none;border:1px solid var(--border);color:var(--text);font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.18s;flex-shrink:0;}
.cbtn:hover{border-color:rgba(77,255,145,0.4);color:var(--green);}
.cbtn.play-btn{background:var(--green);color:#000;border-color:var(--green);font-size:17px;}
#nav{background:var(--panel);border-top:1px solid var(--border);display:flex;flex-shrink:0;}
.nbtn{flex:1;padding:9px 2px 7px;display:flex;flex-direction:column;align-items:center;gap:2px;background:none;border:none;color:var(--sub);cursor:pointer;font-size:9.5px;transition:color 0.18s;}
.nbtn .ni{font-size:20px;line-height:1;}
.nbtn.on{color:var(--green);}
#sheet{position:fixed;bottom:0;left:0;right:0;z-index:80;background:var(--panel);border-radius:20px 20px 0 0;border-top:1px solid var(--border);transform:translateY(100%);transition:transform 0.36s cubic-bezier(0.32,0.72,0,1);max-height:75vh;display:flex;flex-direction:column;box-shadow:0 -8px 40px rgba(0,0,0,0.6);}
#sheet.open{transform:translateY(0);}
.sh-handle{width:38px;height:4px;background:rgba(255,255,255,0.15);border-radius:2px;margin:10px auto 0;flex-shrink:0;cursor:pointer;}
.sh-head{padding:12px 16px;flex-shrink:0;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.sh-city{font-size:18px;font-weight:800;}
.sh-meta{font-size:11px;color:var(--sub);margin-top:2px;}
.sh-time{font-size:16px;font-weight:700;color:var(--green);}
.sh-close{font-size:20px;color:var(--sub);cursor:pointer;padding:4px;}
.sh-list{overflow-y:auto;flex:1;padding-bottom:16px;}
.sh-section{padding:12px 16px 6px;font-size:11px;letter-spacing:1px;color:var(--sub);text-transform:uppercase;}
.sh-see-all{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;color:var(--green);font-size:13px;cursor:pointer;border-top:1px solid var(--border);}
.si{display:flex;align-items:center;padding:13px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:background 0.13s;gap:12px;}
.si:active,.si:hover{background:var(--green-dim);}
.si.playing{background:rgba(77,255,145,0.07);}
.si-dot{width:8px;height:8px;border-radius:50%;background:var(--sub);flex-shrink:0;}
.si-dot.on{background:var(--green);box-shadow:0 0 6px var(--green);}
.si-body{flex:1;min-width:0;}
.si-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.si-meta{font-size:10px;color:var(--sub);margin-top:2px;}
.si-heart{font-size:19px;cursor:pointer;flex-shrink:0;color:var(--sub);transition:all 0.18s;padding:4px;}
.si-heart.on{color:var(--red);}
.tab{position:fixed;inset:0;z-index:60;background:var(--bg);flex-direction:column;display:none;}
.tab.open{display:flex;}
.tab-hd{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;flex-shrink:0;background:var(--panel);}
.tab-back{background:none;border:none;color:var(--green);font-size:26px;cursor:pointer;line-height:1;padding:0;}
.tab-ttl{font-size:17px;font-weight:700;}
.tab-body{flex:1;overflow-y:auto;padding:16px;}
.sinput{width:100%;background:var(--panel2);border:1px solid var(--border);border-radius:12px;padding:12px 16px;color:var(--text);font-size:15px;outline:none;margin-bottom:14px;}
.sinput::placeholder{color:var(--sub);}
.sinput:focus{border-color:rgba(77,255,145,0.4);}
.fav-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:60vh;gap:10px;color:var(--sub);text-align:center;}
.fav-empty .icon{font-size:52px;}
.set-sec{margin-bottom:22px;}
.set-lbl{font-size:10px;letter-spacing:2px;color:var(--sub);text-transform:uppercase;margin-bottom:10px;}
.lang-grid{display:flex;flex-wrap:wrap;gap:7px;}
.lbtn{padding:6px 12px;border-radius:20px;background:var(--panel2);border:1px solid var(--border);color:var(--text);font-size:12px;cursor:pointer;}
.lbtn.on{background:var(--green-dim);border-color:rgba(77,255,145,0.4);color:var(--green);}
.szrow{display:flex;gap:8px;}
.szbtn{flex:1;padding:10px;border-radius:10px;background:var(--panel2);border:1px solid var(--border);color:var(--text);font-size:12px;cursor:pointer;text-align:center;}
.szbtn.on{background:var(--green-dim);border-color:rgba(77,255,145,0.4);color:var(--green);}
.about{background:var(--panel2);border:1px solid var(--border);border-radius:12px;padding:16px;font-size:12px;color:var(--sub);line-height:1.8;}
.about strong{color:var(--text);}
.live-cnt{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;color:var(--sub);padding:20px;}
.live-cnt .big{font-size:60px;}
.live-cnt h2{font-size:20px;font-weight:700;color:var(--text);}
.live-cnt p{font-size:13px;text-align:center;line-height:1.7;max-width:240px;}
.yt-btn{padding:11px 22px;border-radius:22px;background:var(--green);color:#000;font-size:13px;font-weight:700;border:none;cursor:pointer;text-decoration:none;display:inline-block;}
#toast{position:fixed;bottom:150px;left:50%;transform:translateX(-50%) translateY(12px);background:rgba(12,19,32,0.94);border:1px solid var(--border);border-radius:22px;padding:9px 20px;font-size:12px;color:var(--text);pointer-events:none;opacity:0;transition:all 0.28s;z-index:500;white-space:nowrap;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
::-webkit-scrollbar{width:2px;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:1px;}
@media(min-width:520px){#sheet{max-width:460px;left:50%;transform:translateX(-50%) translateY(100%);}#sheet.open{transform:translateX(-50%) translateY(0);}}
</style>
</head>
<body>
<canvas id="stars"></canvas>
<div id="splash">
  <img class="sp-logo-img" src="/logo.jpg" alt="" onerror="this.style.display='none'">
  <div class="sp-brand">Wild Peaks</div>
  <div class="sp-tag">Radio</div>
  <div class="sp-bar"><div class="sp-bar-fill"></div></div>
  <div class="sp-tap" aria-hidden="true">
    <span class="tap-ring r1"></span>
    <span class="tap-ring r2"></span>
    <span class="tap-ring r3"></span>
    <i class="fa-solid fa-hand-pointer tap-finger"></i>
  </div>
</div>
<div id="toast"></div>
<div id="lock-badge">🔒 LOCKED</div>
<div id="app">
  <div id="globe-wrap">
    <canvas id="globe-canvas"></canvas>
    <div id="loading-ring"><div class="ring"></div><div class="ring-txt" data-i18n="loading">Loading</div></div>
    <div id="center-ring"></div>
    <div id="side-btns">
      <div class="sbtn" onclick="gotoMyLocation()">📍</div>
      <div class="sbtn" onclick="shareStation()">🔗</div>
      <div class="sbtn" id="btn-lock" onclick="toggleLock()">🔓</div>
    </div>
  </div>
  <div id="player" onclick="onPlayerTap()">
    <div class="p-brand">Wild Peaks Radio</div>
    <div class="p-info">
      <div class="p-left">
        <div class="p-city" id="p-city" data-i18n="playerDefaultCity">지구를 탐색하세요</div>
        <div class="p-country" id="p-country" data-i18n="playerDefaultCountry">녹색 점을 탭하면 방송국 목록이 열립니다</div>
      </div>
      <div class="p-right">
        <div class="p-time" id="p-time">--:--</div>
        <div class="p-station" id="p-station" data-i18n="playerDefaultStation">방송국 없음</div>
      </div>
    </div>
    <div class="p-controls">
      <button class="cbtn" id="btn-mute" onclick="event.stopPropagation();toggleMute()">🔊</button>
      <div class="eq paused" id="eq">
        <div class="eq-b"></div><div class="eq-b"></div><div class="eq-b"></div><div class="eq-b"></div><div class="eq-b"></div>
      </div>
      <button class="cbtn play-btn" id="btn-play" onclick="event.stopPropagation();togglePlay()">▶</button>
      <button class="cbtn" onclick="event.stopPropagation();nextStation()">⏭</button>
    </div>
  </div>
  <div id="nav">
    <button class="nbtn on" data-t="globe" onclick="switchTab('globe')"><span class="ni">🌍</span><span data-i18n="navExplore">탐색</span></button>
    <button class="nbtn" data-t="fav" onclick="switchTab('fav')"><span class="ni">♡</span><span data-i18n="navFav">즐겨찾기</span></button>
    <button class="nbtn" data-t="live" onclick="switchTab('live')"><span class="ni">🔴</span><span data-i18n="navLive">라이브</span></button>
    <button class="nbtn" data-t="search" onclick="switchTab('search')"><span class="ni">🔍</span><span data-i18n="navSearch">검색</span></button>
    <button class="nbtn" data-t="settings" onclick="switchTab('settings')"><span class="ni">☰</span><span data-i18n="navSettings">설정</span></button>
  </div>
</div>
<div id="sheet">
  <div class="sh-handle" onclick="closeSheet()"></div>
  <div class="sh-head">
    <div><div class="sh-city" id="sh-city" data-i18n="sheetDefaultCity">방송국</div><div class="sh-meta" id="sh-meta"></div></div>
    <div style="display:flex;align-items:center;gap:12px;">
      <div class="sh-time" id="sh-time"></div>
      <div class="sh-close" onclick="closeSheet()">✕</div>
    </div>
  </div>
  <div class="sh-list" id="sh-list"></div>
</div>
<div class="tab" id="tab-fav">
  <div class="tab-hd"><button class="tab-back" onclick="closeTab('fav')">‹</button><div class="tab-ttl" data-i18n="tabTtlFav">즐겨찾기</div></div>
  <div class="tab-body" id="fav-body"></div>
</div>
<div class="tab" id="tab-live">
  <div class="tab-hd"><button class="tab-back" onclick="closeTab('live')">‹</button><div class="tab-ttl" data-i18n="tabTtlLive">라이브</div></div>
  <div class="live-cnt">
    <div class="big">📡</div><h2 data-i18n="liveComingSoon">Coming Soon</h2>
    <p data-i18n="liveDesc">YouTube 라이브 연동이 곧 추가됩니다!</p>
    <a class="yt-btn" href="https://youtube.com/@wildpeaks-wp" target="_blank">▶ Wild Peaks YouTube</a>
  </div>
</div>
<div class="tab" id="tab-search">
  <div class="tab-hd"><button class="tab-back" onclick="closeTab('search')">‹</button><div class="tab-ttl" data-i18n="tabTtlSearch">검색</div></div>
  <div class="tab-body">
    <input class="sinput" id="search-input" data-i18n-placeholder="searchPlaceholder" placeholder="방송국 또는 도시명 검색…" oninput="doSearch(this.value)">
    <div id="search-results"></div>
  </div>
</div>
<div class="tab" id="tab-settings">
  <div class="tab-hd"><button class="tab-back" onclick="closeTab('settings')">‹</button><div class="tab-ttl" data-i18n="tabTtlSettings">설정</div></div>
  <div class="tab-body">
    <div class="set-sec"><div class="set-lbl" data-i18n="settingsLang">언어</div><div class="lang-grid" id="lang-grid"></div></div>
    <div class="set-sec">
      <div class="set-lbl" data-i18n="settingsDotSize">지구본 점 크기</div>
      <div class="szrow">
        <button class="szbtn" data-s="sm" data-i18n="dotSmall" onclick="setDotSize('sm')">작게</button>
        <button class="szbtn on" data-s="md" data-i18n="dotMedium" onclick="setDotSize('md')">보통</button>
        <button class="szbtn" data-s="lg" data-i18n="dotLarge" onclick="setDotSize('lg')">크게</button>
      </div>
    </div>
    <div class="set-sec">
      <div class="set-lbl" data-i18n="settingsInfo">정보</div>
      <div class="about" id="about-box"><strong>Wild Peaks Radio v2.0</strong><br>전 세계 라디오 방송국을 지구본에서 탐색하세요.<br><br>데이터: <strong>radio-browser.info</strong><br>3D: <strong>Three.js r128</strong></div>
    </div>
  </div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
var ST={
  stations:[],clusters:[],dots:[],
  current:null,currentCluster:null,sheetList:[],
  favs:JSON.parse(localStorage.getItem('wp_favs')||'[]'),
  playing:false,muted:false,locked:false,
  dotSize:localStorage.getItem('wp_dotsize')||'md',
  lang:localStorage.getItem('wp_lang')||'auto',
  myLat:0,myLon:0,hasGPS:false,
  stationsReady:false,
  pendingStation:null,
  timerId:null,sheetTimerId:null,
  _lastRingCluster:null
};

// 스플래시 탭 핸들러와 오디오 엘리먼트는 스크립트 최상단, THREE.js/3D 초기화보다
// 먼저 만든다. CDN에서 three.js 로드가 실패하거나 WebGL 초기화가 실패하면 그
// 아래 THREE 의존 코드에서 예외가 발생해 스크립트 실행이 그 지점에서 멈추는데,
// audio 변수가 그보다 뒤에서 만들어지면 enterApp()의 unlockAudio()가
// "audio가 undefined"로 다시 크래시해서 결국 스플래시가 안 넘어갔다.
// enterApp은 함수 선언이라 호이스팅되므로 여기서 먼저 연결해도 된다.
var audio=new Audio();audio.crossOrigin='anonymous';
document.getElementById('splash').addEventListener('click',function(){enterApp();});
document.getElementById('splash').addEventListener('touchend',function(){enterApp();});
setTimeout(function(){enterApp();},4500);

/* STARS */
(function(){
  var c=document.getElementById('stars'),ctx=c.getContext('2d'),stars=[];
  function resize(){c.width=innerWidth;c.height=innerHeight;}
  resize();window.addEventListener('resize',resize);
  for(var i=0;i<180;i++)stars.push({x:Math.random(),y:Math.random(),r:Math.random()*1.1+0.2,a:Math.random(),da:(Math.random()-0.5)*0.006});
  (function draw(){
    ctx.clearRect(0,0,c.width,c.height);
    for(var i=0;i<stars.length;i++){
      var s=stars[i];s.a+=s.da;if(s.a<0||s.a>1)s.da*=-1;
      ctx.beginPath();ctx.arc(s.x*c.width,s.y*c.height,s.r,0,Math.PI*2);
      ctx.fillStyle='rgba(255,255,255,'+(0.2+s.a*0.55)+')';ctx.fill();
    }
    requestAnimationFrame(draw);
  })();
})();

/* THREE.JS GLOBE */
var scene,cam,ren,globe,atmo,nowPlayingMarker;
var drag=false,dragMoved=false,pMouse={x:0,y:0};
var autoRot=true,zoomTarget=null,pinch0=null;
var velQ=new THREE.Quaternion();
var ray=new THREE.Raycaster(),mXY=new THREE.Vector2();

function initGlobe(){
  var wrap=document.getElementById('globe-wrap'),cv=document.getElementById('globe-canvas');
  var W=wrap.clientWidth,H=wrap.clientHeight;
  scene=new THREE.Scene();
  cam=new THREE.PerspectiveCamera(45,W/H,0.1,1000);
  cam.position.z=3.8;
  ren=new THREE.WebGLRenderer({canvas:cv,antialias:true,alpha:true});
  ren.setPixelRatio(Math.min(devicePixelRatio,2));
  ren.setSize(W,H);
  ren.setClearColor(0x000000,0);
  var tex=new THREE.TextureLoader().load('/earth.jpg');
  globe=new THREE.Mesh(
    new THREE.SphereGeometry(1,64,64),
    new THREE.MeshPhongMaterial({map:tex,specular:new THREE.Color(0x1a2244),shininess:6})
  );
  scene.add(globe);

  // 현재 재생 중인 방송국의 정확한 위도/경도를 표시하는 전용 마커.
  // 클러스터 대표점(clusterStations의 첫 방송국 좌표)과는 별개로,
  // 항상 실제 재생 중인 방송국(s.lat/s.lon)의 좌표만 사용한다.
  nowPlayingMarker=new THREE.Mesh(
    new THREE.SphereGeometry(0.011,16,16),
    new THREE.MeshBasicMaterial({color:0xff4d7e})
  );
  nowPlayingMarker.visible=false;
  globe.add(nowPlayingMarker);

  atmo=new THREE.Mesh(new THREE.SphereGeometry(1.045,64,64),new THREE.ShaderMaterial({
    vertexShader:'varying vec3 vN;void main(){vN=normalize(normalMatrix*normal);gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);}',
    fragmentShader:'varying vec3 vN;void main(){float i=pow(0.55-dot(vN,vec3(0,0,1)),2.0);gl_FragColor=vec4(0.15,0.45,1.0,1.0)*i*0.9;}',
    side:THREE.FrontSide,blending:THREE.AdditiveBlending,transparent:true
  }));
  scene.add(atmo);
  scene.add(new THREE.AmbientLight(0xffffff,0.45));
  var sun=new THREE.DirectionalLight(0xffffff,1.0);sun.position.set(5,3,5);scene.add(sun);

  window.addEventListener('resize',function(){
    var W2=wrap.clientWidth,H2=wrap.clientHeight;
    cam.aspect=W2/H2;cam.updateProjectionMatrix();ren.setSize(W2,H2);
  });
  cv.addEventListener('pointerdown',onMD);
  cv.addEventListener('pointermove',onMM);
  cv.addEventListener('pointerup',onMU);
  cv.addEventListener('pointercancel',onMU);
  cv.addEventListener('wheel',onWH,{passive:false});
  cv.addEventListener('touchstart',onTS,{passive:false});
  cv.addEventListener('touchmove',onTM,{passive:false});
  cv.addEventListener('touchend',onTE,{passive:false});
  loop();
}

function loop(){
  requestAnimationFrame(loop);
  if(!drag){
    globe.quaternion.multiplyQuaternions(velQ,globe.quaternion);
    velQ.slerp(new THREE.Quaternion(),0.08);
    if(autoRot){
      var autoQ=new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0,1,0),0.0007);
      globe.quaternion.multiplyQuaternions(autoQ,globe.quaternion);
    }
    atmo.quaternion.copy(globe.quaternion);
  }
  if(zoomTarget!==null){
    var diff=cam.position.z-zoomTarget;
    var spd=Math.abs(diff)>3?0.008:Math.abs(diff)>1?0.02:0.06;
    cam.position.z+=(zoomTarget-cam.position.z)*spd;
    if(Math.abs(diff)<0.005){cam.position.z=zoomTarget;zoomTarget=null;}
  }
  checkCenterRing();
  ren.render(scene,cam);
}

/* DRAG */
function applyDrag(dx,dy){
  var spd=0.003*(cam.position.z/3.8);
  var qY=new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0,1,0),dx*spd);
  var qX=new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(1,0,0),dy*spd);
  var q=new THREE.Quaternion().multiplyQuaternions(qX,qY);
  globe.quaternion.multiplyQuaternions(q,globe.quaternion);
  atmo.quaternion.copy(globe.quaternion);
  velQ.copy(q);
}

function onMD(e){
  if(e.pointerType==='touch'||(e.button!==undefined&&e.button!==0))return;
  drag=true;dragMoved=false;pMouse={x:e.clientX,y:e.clientY};autoRot=false;velQ.identity();
  if(e.pointerId!==undefined)ren.domElement.setPointerCapture(e.pointerId);
}
function onMM(e){
  if(e.pointerType==='touch')return;
  if(!drag)return;
  var dx=e.clientX-pMouse.x,dy=e.clientY-pMouse.y;
  if(Math.abs(dx)>2||Math.abs(dy)>2)dragMoved=true;
  applyDrag(dx,dy);
  pMouse={x:e.clientX,y:e.clientY};
}
function onMU(e){
  if(e.pointerType==='touch')return;
  if(!dragMoved)handleTap(e.clientX,e.clientY);
  drag=false;
  if(e.pointerId!==undefined&&ren.domElement.hasPointerCapture&&ren.domElement.hasPointerCapture(e.pointerId))ren.domElement.releasePointerCapture(e.pointerId);
}
function onWH(e){e.preventDefault();cam.position.z=Math.max(1.2,Math.min(8,cam.position.z+e.deltaY*0.003));}
function onTS(e){
  if(e.touches.length===2)pinch0=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
  else{drag=true;dragMoved=false;pMouse={x:e.touches[0].clientX,y:e.touches[0].clientY};autoRot=false;velQ.identity();}
}
function onTM(e){
  e.preventDefault();
  if(e.touches.length===2&&pinch0!==null){
    var d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    cam.position.z=Math.max(1.2,Math.min(8,cam.position.z-(d-pinch0)*0.01));pinch0=d;
  }else if(drag){
    var dx=e.touches[0].clientX-pMouse.x,dy=e.touches[0].clientY-pMouse.y;
    if(Math.abs(dx)>3||Math.abs(dy)>3)dragMoved=true;
    applyDrag(dx,dy);
    pMouse={x:e.touches[0].clientX,y:e.touches[0].clientY};
  }
}
function onTE(e){
  if(e.touches.length<2)pinch0=null;
  drag=false;
  if(!dragMoved){var t=e.changedTouches[0];handleTap(t.clientX,t.clientY);}
}

function handleTap(cx,cy){
  var sheet=document.getElementById('sheet');
  if(sheet.classList.contains('open')){closeSheet();return;}
  var rect=ren.domElement.getBoundingClientRect();
  mXY.x=((cx-rect.left)/rect.width)*2-1;
  mXY.y=-((cy-rect.top)/rect.height)*2+1;
  ray.setFromCamera(mXY,cam);
  var hits=ray.intersectObjects(ST.dots);
  if(hits.length){
    var cl=hits[0].object.userData.cluster;
    openSheet(cl);
    if(!ST.locked&&cl.stations.length>0)play(cl.stations[0]);
  }
}

/* CENTER RING */
var _ringLast=0,_ringHoldTimer=null,_ringActiveDot=null;
var _ringEl=document.getElementById('center-ring');

function setRingGreen(on){
  if(on){_ringEl.style.borderColor='rgba(77,255,145,0.9)';_ringEl.style.boxShadow='0 0 8px rgba(77,255,145,0.6)';}
  else{_ringEl.style.borderColor='rgba(255,255,255,0.7)';_ringEl.style.boxShadow='none';}
}

function checkCenterRing(){
  var now=Date.now();
  if(now-_ringLast<100)return;
  _ringLast=now;
  if(!ST.dots.length||drag)return;
  var vqw=velQ.w;
  if(Math.abs(1-Math.abs(vqw))*2>0.0001)return;

  var rect=ren.domElement.getBoundingClientRect();
  var cx=rect.width/2,cy=rect.height/2;
  var ringR=30;
  var best=null,bestDist=9999;
  var tmpV=new THREE.Vector3();

  for(var i=0;i<ST.dots.length;i++){
    var d=ST.dots[i];
    d.getWorldPosition(tmpV);
    var ndc=tmpV.clone().project(cam);
    if(ndc.z>1)continue;
    var px=(ndc.x*0.5+0.5)*rect.width;
    var py=(-ndc.y*0.5+0.5)*rect.height;
    var dist=Math.hypot(px-cx,py-cy);
    if(dist<bestDist){bestDist=dist;best=d;}
  }

  if(best&&bestDist<ringR){
    var dot=best.userData.visualDot||best;
    var cl=best.userData.cluster;
    if(_ringActiveDot&&_ringActiveDot!==dot){
      _ringActiveDot.material.color.setHex(0x4dff91);_ringActiveDot=null;
    }
    dot.material.color.setHex(0xffffff);
    _ringActiveDot=dot;
    setRingGreen(true);
    velQ.identity();
    if(ST._lastRingCluster===cl)return;
    ST._lastRingCluster=cl;
    clearTimeout(_ringHoldTimer);
    _ringHoldTimer=setTimeout(function(){
      if(ST._lastRingCluster!==cl)return;
      if(!ST.locked&&cl.stations.length>0){
        var s=cl.stations[0];
        if(ST.current&&ST.current.uuid===s.uuid)return;
        audio.pause();audio.src='';
        ST.current=s;audio.src=s.url;audio.muted=ST.muted;audio.load();
        audio.play().then(function(){
          ST.playing=true;
          document.getElementById('btn-play').textContent='⏸';
          document.getElementById('eq').classList.remove('paused');
        }).catch(function(){
          showToast(t('toastTapToPlay',{name:s.name}));
        });
        document.getElementById('p-station').textContent=s.name;
        document.getElementById('p-city').textContent=s.country||'Unknown';
        document.getElementById('p-country').textContent=s.state||s.codec||'';
        updateClock(s.lat,s.lon);
        updateNowPlayingMarker(s);
        showToast(t('toastNowPlaying',{name:s.name}));
      }
    },600);
  }else{
    if(_ringActiveDot){_ringActiveDot.material.color.setHex(0x4dff91);_ringActiveDot=null;}
    setRingGreen(false);
    ST._lastRingCluster=null;
    clearTimeout(_ringHoldTimer);
  }
}

/* GLOBE UTILS */
// 재생 중인 방송국의 정확한 위도/경도로 now-playing 마커 위치를 갱신
function updateNowPlayingMarker(s){
  if(!nowPlayingMarker||!s||isNaN(s.lat)||isNaN(s.lon)){if(nowPlayingMarker)nowPlayingMarker.visible=false;return;}
  nowPlayingMarker.position.copy(ll2v(s.lat,s.lon,1.024));
  nowPlayingMarker.visible=true;
}

// Three.js SphereGeometry 기본 UV 매핑과 일치하는 좌표계
function ll2v(lat,lon,r){
  r=r||1.0;
  var phi=(90-lat)*Math.PI/180;
  var th=(lon+180)*Math.PI/180;
  return new THREE.Vector3(
    -r*Math.sin(phi)*Math.cos(th),
    r*Math.cos(phi),
    r*Math.sin(phi)*Math.sin(th)
  );
}

// flyTo: 목표 지점을 카메라 정면(+Z)으로 보내되, 북극(로컬 +Y)이 항상 화면 위쪽을
// 향하도록 롤(roll)이 생기지 않는 회전을 계산한다.
// setFromUnitVectors(pos, +Z) 한 번으로는 pos→+Z 매핑만 보장될 뿐 회전축 주변의
// "롤"은 결정되지 않아 임의의 값이 되고, 그 결과 위도/경도에 따라 지구본이
// 옆으로 누운 것처럼 보이는 버그가 있었다. lookAt 기저(북극을 up으로 사용)로
// 회전을 구성하면 롤이 0으로 고정된다.
var _flyToToken=0;
function flyTo(lat,lon,zoom){
  zoom=zoom||2.0;
  autoRot=false;

  // flyTo()가 애니메이션 도중 다시 호출되면(예: GPS 성공 콜백이 내 위치로 flyTo한
  // 직후 autoPlayNearby가 방송국 좌표로 다시 flyTo하는 경우) 이전 애니메이션의
  // requestAnimationFrame 루프가 여전히 살아있어 두 애니메이션이 같은 globe.quaternion을
  // 동시에 덮어써서 "여러 목적지를 거쳐가는" 것처럼 보였다. 토큰으로 이전 루프를 무효화한다.
  _flyToToken++;
  var myToken=_flyToToken;

  var pos=ll2v(lat,lon,1.0).normalize();
  var north=new THREE.Vector3(0,1,0);

  // pos 방향에서 원점을 바라보며 up=north로 정렬한 기저 행렬 M.
  // M은 로컬 e_z를 pos로 보내므로, 우리가 원하는(pos를 +Z로 보내는) 회전은 M의 역(=전치=켤레).
  var m=new THREE.Matrix4().lookAt(pos,new THREE.Vector3(0,0,0),north);
  var basisQ=new THREE.Quaternion().setFromRotationMatrix(m);
  var targetQ=basisQ.clone().conjugate();

  var startQ = globe.quaternion.clone();
  var t = 0;
  (function step(){
    if(myToken!==_flyToToken)return;
    t += 0.025;
    var e = 1 - Math.pow(1 - Math.min(t, 1), 3);
    globe.quaternion.slerpQuaternions(startQ, targetQ, e);
    atmo.quaternion.copy(globe.quaternion);
    if(t < 1) requestAnimationFrame(step);
  })();
  zoomTarget = zoom;
}

function buildDots(){
  for(var i=0;i<ST.dots.length;i++)globe.remove(ST.dots[i]);
  ST.dots=[];
  var dotR={sm:0.003,md:0.005,lg:0.008}[ST.dotSize]||0.005;
  var hitR=dotR*6;
  for(var i=0;i<ST.clusters.length;i++){
    var cl=ST.clusters[i];
    var pos=ll2v(cl.lat,cl.lon,1.018);
    var m=new THREE.Mesh(new THREE.SphereGeometry(dotR,16,16),new THREE.MeshBasicMaterial({color:0x4dff91}));
    m.position.copy(pos);m.userData={cluster:cl};globe.add(m);
    var hit=new THREE.Mesh(new THREE.SphereGeometry(hitR,8,8),new THREE.MeshBasicMaterial({visible:false}));
    hit.position.copy(pos);hit.userData={cluster:cl,visualDot:m};globe.add(hit);
    ST.dots.push(hit);
  }
}

function clusterStations(stations){
  var THR=0.8,cls=[];
  for(var i=0;i<stations.length;i++){
    var s=stations[i];
    if(isNaN(s.lat)||isNaN(s.lon))continue;
    var found=null;
    for(var j=0;j<cls.length;j++){if(Math.hypot(cls[j].lat-s.lat,cls[j].lon-s.lon)<THR){found=cls[j];break;}}
    if(found)found.stations.push(s);
    else cls.push({lat:s.lat,lon:s.lon,stations:[s],country:s.country});
  }
  return cls;
}

/* API */
var apiBase='https://de1.api.radio-browser.info';

function loadStations(){
  setLoading(true);
  var countryCodePromise=ST.hasGPS?getCountryCodeFromLatLon(ST.myLat,ST.myLon):Promise.resolve('KR');
  countryCodePromise.then(function(countryCode){
    fetch(apiBase+'/json/stations/bycountrycodeexact/'+countryCode+'?limit=500&hidebroken=true&order=clickcount&reverse=true')
    .then(function(r){return r.json();})
    .then(function(local){
      for(var i=0;i<local.length;i++){
        if(!local[i].geo_lat||!local[i].geo_long){
          local[i].geo_lat=String(ST.myLat||37.5665);
          local[i].geo_long=String(ST.myLon||126.9780);
        }
      }
      onLoaded(local);
      showToast(t('toastLocalLoaded'));
      loadAllStations(local);
    })
    .catch(function(){loadAllStations([]);});
  });
}

/* 위경도 → 국가코드: BigDataCloud 무료 역지오코딩 API 사용 (키 불필요, CORS 허용)
   실패 시(오프라인 등)에만 대략적인 대륙 범위로 폴백 */
function getCountryCodeFromLatLon(lat,lon){
  return fetch('https://api.bigdatacloud.net/data/reverse-geocode-client?latitude='+lat+'&longitude='+lon+'&localityLanguage=en')
    .then(function(r){return r.json();})
    .then(function(data){return (data&&data.countryCode)?data.countryCode:getCountryCodeFallback(lat,lon);})
    .catch(function(){return getCountryCodeFallback(lat,lon);});
}

function getCountryCodeFallback(lat,lon){
  if(lat>=33&&lat<=43&&lon>=124&&lon<=132)return'KR';
  if(lat>=24&&lat<=46&&lon>=122&&lon<=154)return'JP';
  if(lat>=18&&lat<=54&&lon>=73&&lon<=135)return'CN';
  if(lat>=37&&lat<=70&&lon>=27&&lon<=180)return'RU';
  if(lat>=24&&lat<=50&&lon>=-125&&lon<=-65)return'US';
  if(lat>=42&&lat<=84&&lon>=-141&&lon<=-52)return'CA';
  if(lat>=-55&&lat<=-10&&lon>=-74&&lon<=-34)return'BR';
  if(lat>=36&&lat<=72&&lon>=-10&&lon<=40)return'DE';
  return'KR';
}

function loadAllStations(alreadyLoaded){
  var seen={};
  for(var i=0;i<alreadyLoaded.length;i++)seen[alreadyLoaded[i].stationuuid]=true;
  var p1=fetch(apiBase+'/json/stations?limit=5000&hidebroken=true&has_geo_info=true&order=clickcount&reverse=true').then(function(r){return r.json();}).catch(function(){return[];});
  var p2=fetch(apiBase+'/json/stations/bycountrycodeexact/KR?limit=500&hidebroken=true&order=clickcount&reverse=true').then(function(r){return r.json();}).catch(function(){return[];});
  Promise.all([p1,p2]).then(function(results){
    var combined=results[0];
    var kr=results[1];
    for(var i=0;i<kr.length;i++){
      if(!kr[i].geo_lat||!kr[i].geo_long){kr[i].geo_lat='37.5665';kr[i].geo_long='126.9780';}
      if(!seen[kr[i].stationuuid])combined.push(kr[i]);
    }
    var newData=[];
    for(var i=0;i<combined.length;i++){if(!seen[combined[i].stationuuid])newData.push(combined[i]);}
    if(newData.length>0)onLoaded(combined);
    showToast(t('toastAllLoaded',{n:ST.stations.length.toLocaleString()}));
  });
}

function onLoaded(data){
  ST.stations=[];
  for(var i=0;i<data.length;i++){
    var s=data[i];
    if(!s.geo_lat||!s.geo_long)continue;
    ST.stations.push({
      name:(s.name||'').trim()||'Unknown',url:s.url_resolved||s.url,
      lat:parseFloat(s.geo_lat),lon:parseFloat(s.geo_long),
      country:s.country||'',state:s.state||'',
      codec:s.codec||'',bitrate:parseInt(s.bitrate)||0,uuid:s.stationuuid||''
    });
  }
  ST.clusters=clusterStations(ST.stations);
  buildDots();setLoading(false);
  ST.stationsReady=true;
  if(ST.hasGPS)autoPlayNearby();
  setTimeout(function(){document.getElementById('center-ring').classList.add('visible');},1800);
}

function autoPlayNearby(){
  if(!ST.hasGPS||!ST.stationsReady)return;
  var best=null,bestD=9999;
  for(var i=0;i<ST.clusters.length;i++){
    var cl=ST.clusters[i];
    var dLat=cl.lat-ST.myLat;
    var dLon=((cl.lon-ST.myLon+540)%360-180)*Math.cos(ST.myLat*Math.PI/180);
    var d=Math.sqrt(dLat*dLat+dLon*dLon);
    if(d<bestD){bestD=d;best=cl;}
  }
  if(best&&best.stations.length>0){
    ST.currentCluster=best;
    var s=best.stations[0];
    if(_audioUnlocked){play(s);}
    else{
      ST.pendingStation=s;
      document.getElementById('p-station').textContent=s.name;
      document.getElementById('p-city').textContent=s.country||'Unknown';
      document.getElementById('p-country').textContent=s.state||s.codec||'';
      updateClock(s.lat,s.lon);
      showToast(t('toastTapWhenReady',{name:s.name}));
      function startOnInteraction(){
        if(ST.pendingStation){play(ST.pendingStation);ST.pendingStation=null;}
        document.removeEventListener('click',startOnInteraction);
        document.removeEventListener('touchend',startOnInteraction);
      }
      document.addEventListener('click',startOnInteraction);
      document.addEventListener('touchend',startOnInteraction);
    }
  }
}

function setLoading(v){document.getElementById('loading-ring').classList.toggle('show',v);}

/* SHEET */
function onPlayerTap(){if(ST.currentCluster)openSheet(ST.currentCluster);}

function openSheet(cl){
  ST.currentCluster=cl;ST.sheetList=cl.stations;
  document.getElementById('sh-city').textContent=cl.country||t('sheetDefaultCity');
  document.getElementById('sh-meta').textContent=t('stationCount',{n:cl.stations.length});
  clearInterval(ST.sheetTimerId);
  ST.sheetTimerId=setInterval(function(){
    var off=getTimezoneOffset(cl.lat,cl.lon);
    var now=new Date(),utc=now.getTime()+now.getTimezoneOffset()*60000,lc=new Date(utc+off*3600000);
    document.getElementById('sh-time').textContent=String(lc.getHours()).padStart(2,'0')+':'+String(lc.getMinutes()).padStart(2,'0');
  },1000);
  updateClock(cl.lat,cl.lon);
  renderSheetList(cl);
  document.getElementById('sheet').classList.add('open');
  document.getElementById('p-city').textContent=cl.country||'Unknown';
  document.getElementById('p-country').textContent=(cl.stations[0]&&cl.stations[0].state)||t('stationCount',{n:cl.stations.length});
}
function closeSheet(){document.getElementById('sheet').classList.remove('open');clearInterval(ST.sheetTimerId);}

function renderSheetList(cl){
  var ul=document.getElementById('sh-list');ul.innerHTML='';
  var sec=document.createElement('div');sec.className='sh-section';sec.textContent=countryStationsLabel(cl.country);ul.appendChild(sec);
  var list=cl.stations,max=Math.min(5,list.length);
  for(var i=0;i<max;i++)ul.appendChild(makeItem(list[i],i,'sheet'));
  if(list.length>5){
    var sa=document.createElement('div');sa.className='sh-see-all';
    sa.innerHTML=t('seeAllStations',{n:list.length})+' <span>›</span>';
    (function(l){sa.onclick=function(){ul.innerHTML='';var s2=document.createElement('div');s2.className='sh-section';s2.textContent=countryStationsLabel(cl.country);ul.appendChild(s2);for(var i=0;i<l.length;i++)ul.appendChild(makeItem(l[i],i,'sheet'));renderNearby(cl,ul);};})(list);
    ul.appendChild(sa);
  }
  renderNearby(cl,ul);
}

function renderNearby(cl,ul){
  var nearby=[];
  for(var i=0;i<ST.clusters.length;i++){
    var c=ST.clusters[i];if(c===cl)continue;
    var d=Math.hypot(c.lat-cl.lat,c.lon-cl.lon);
    if(d<15)nearby.push({cl:c,d:d});
  }
  nearby.sort(function(a,b){return a.d-b.d;});nearby=nearby.slice(0,8);
  if(!nearby.length)return;
  var sec=document.createElement('div');sec.className='sh-section';sec.textContent=t('nearbySection');ul.appendChild(sec);
  for(var i=0;i<nearby.length;i++){
    var nc=nearby[i].cl;if(!nc.stations.length)continue;
    var s=nc.stations[0];
    var div=document.createElement('div');div.className='si';
    var isFav=ST.favs.some(function(f){return f.uuid===s.uuid;});
    div.innerHTML='<div class="si-dot'+(ST.current&&ST.current.uuid===s.uuid?' on':'')+'"></div>'+
      '<div class="si-body"><div class="si-name">'+esc(s.name)+'</div><div class="si-meta">'+(nc.country||'')+' · '+t('stationCount',{n:nc.stations.length})+'</div></div>'+
      '<div class="si-heart'+(isFav?' on':'')+'" onclick="tapHeartUUID(event,\''+s.uuid+'\')">'+(isFav?'♥':'♡')+'</div>';
    (function(cluster,station){div.addEventListener('click',function(e){if(e.target.classList.contains('si-heart'))return;openSheet(cluster);play(station);});})(nc,s);
    ul.appendChild(div);
  }
}

function tapHeartUUID(e,uuid){
  e.stopPropagation();
  var s=null;for(var i=0;i<ST.stations.length;i++){if(ST.stations[i].uuid===uuid){s=ST.stations[i];break;}}
  if(!s)return;
  var fi=ST.favs.findIndex(function(f){return f.uuid===uuid;});
  if(fi>=0){ST.favs.splice(fi,1);showToast(t('toastFavRemoved'));}else{ST.favs.push(s);showToast(t('toastFavAdded'));}
  localStorage.setItem('wp_favs',JSON.stringify(ST.favs));
  if(ST.currentCluster)renderSheetList(ST.currentCluster);renderFav();
}

function makeItem(s,i,ctx){
  var div=document.createElement('div');
  div.className='si'+(ST.current&&ST.current.uuid===s.uuid?' playing':'');
  var isFav=ST.favs.some(function(f){return f.uuid===s.uuid;});
  var isPlay=ST.current&&ST.current.uuid===s.uuid;
  div.innerHTML='<div class="si-dot'+(isPlay?' on':'')+'"></div>'+
    '<div class="si-body"><div class="si-name">'+esc(s.name)+'</div><div class="si-meta">'+(s.codec||'MP3')+(s.bitrate?' · '+s.bitrate+'kbps':'')+' · '+s.country+'</div></div>'+
    '<div class="si-heart'+(isFav?' on':'')+'" onclick="tapHeart(event,'+i+',\''+ctx+'\')">'+(isFav?'♥':'♡')+'</div>';
  div.addEventListener('click',function(e){
    if(e.target.classList.contains('si-heart'))return;
    play(s);if(ST.currentCluster)renderSheetList(ST.currentCluster);renderFav();
  });
  return div;
}

function tapHeart(e,idx,ctx){
  e.stopPropagation();
  var list=ctx==='fav'?ST.favs:ST.sheetList;var s=list[idx];if(!s)return;
  var fi=ST.favs.findIndex(function(f){return f.uuid===s.uuid;});
  if(fi>=0){ST.favs.splice(fi,1);showToast(t('toastFavRemoved'));}else{ST.favs.push(s);showToast(t('toastFavAdded'));}
  localStorage.setItem('wp_favs',JSON.stringify(ST.favs));
  if(ST.currentCluster)renderSheetList(ST.currentCluster);renderFav();
}

function renderFav(){
  var el=document.getElementById('fav-body');
  if(!ST.favs.length){el.innerHTML='<div class="fav-empty"><div class="icon">♡</div><div style="font-size:14px;font-weight:600;">'+esc(t('favEmptyTitle'))+'</div><div style="font-size:12px;margin-top:4px;">'+esc(t('favEmptyDesc'))+'</div></div>';return;}
  el.innerHTML='';for(var i=0;i<ST.favs.length;i++)el.appendChild(makeItem(ST.favs[i],i,'fav'));
}

/* AUDIO */
function play(s){
  ST.current=s;audio.src=s.url;audio.muted=ST.muted;
  audio.play().catch(function(){});ST.playing=true;
  document.getElementById('btn-play').textContent='⏸';
  document.getElementById('eq').classList.remove('paused');
  document.getElementById('p-station').textContent=s.name;
  document.getElementById('p-city').textContent=s.country||'Unknown';
  document.getElementById('p-country').textContent=s.state||s.codec||'';
  updateClock(s.lat,s.lon);
  updateNowPlayingMarker(s);
  if(s.lat&&s.lon)flyTo(s.lat,s.lon,1.8);
}
function togglePlay(){
  if(!ST.current){if(ST.sheetList.length)play(ST.sheetList[0]);else if(ST.clusters.length)play(ST.clusters[0].stations[0]);return;}
  if(ST.playing){audio.pause();ST.playing=false;document.getElementById('btn-play').textContent='▶';document.getElementById('eq').classList.add('paused');}
  else{audio.play().catch(function(){});ST.playing=true;document.getElementById('btn-play').textContent='⏸';document.getElementById('eq').classList.remove('paused');}
}
function nextStation(){
  if(!ST.sheetList.length){if(ST.clusters.length)play(ST.clusters[0].stations[0]);return;}
  var idx=ST.sheetList.findIndex(function(s){return ST.current&&s.uuid===ST.current.uuid;});
  play(ST.sheetList[(idx+1)%ST.sheetList.length]);
}
function toggleMute(){ST.muted=!ST.muted;audio.muted=ST.muted;document.getElementById('btn-mute').textContent=ST.muted?'🔇':'🔊';}

/* CLOCK */
function getTimezoneOffset(lat,lon){
  if(lat>=33&&lat<=43&&lon>=124&&lon<=132)return 9;
  if(lat>=24&&lat<=46&&lon>=122&&lon<=154)return 9;
  if(lat>=18&&lat<=54&&lon>=73&&lon<=135)return 8;
  if(lat>=-44&&lat<=-10&&lon>=112&&lon<=154)return 10;
  if(lat>=37&&lat<=70&&lon>=27&&lon<=60)return 3;
  if(lat>=24&&lat<=50&&lon>=-125&&lon<=-65)return -5;
  if(lat>=24&&lat<=50&&lon>=-115&&lon<=-85)return -6;
  if(lat>=36&&lat<=72&&lon>=-10&&lon<=15)return 1;
  if(lat>=36&&lat<=72&&lon>=15&&lon<=40)return 2;
  if(lat>=-55&&lat<=-10&&lon>=-74&&lon<=-34)return -3;
  if(lat>=20&&lat<=37&&lon>=25&&lon<=60)return 3;
  if(lat>=8&&lat<=37&&lon>=60&&lon<=80)return 5.5;
  if(lat>=1&&lat<=28&&lon>=95&&lon<=141)return 7;
  return Math.round(lon/15);
}

function updateClock(lat,lon){
  clearInterval(ST.timerId);
  var off=getTimezoneOffset(lat,lon);
  ST.timerId=setInterval(function(){
    var now=new Date(),utc=now.getTime()+now.getTimezoneOffset()*60000,lc=new Date(utc+off*3600000);
    document.getElementById('p-time').textContent=String(lc.getHours()).padStart(2,'0')+':'+String(lc.getMinutes()).padStart(2,'0');
  },1000);
}

/* GPS */
function gotoMyLocation(){
  if(ST.hasGPS){flyTo(ST.myLat,ST.myLon,1.8);return;}
  showToast(t('toastLocating'));
  if(navigator.geolocation)navigator.geolocation.getCurrentPosition(function(pos){
    ST.myLat=pos.coords.latitude;ST.myLon=pos.coords.longitude;ST.hasGPS=true;
    flyTo(ST.myLat,ST.myLon,1.8);showToast(t('toastLocated'));
  },function(){showToast(t('toastLocationDenied'));});
}

/* LOCK */
function toggleLock(){
  ST.locked=!ST.locked;
  document.getElementById('btn-lock').textContent=ST.locked?'🔒':'🔓';
  document.getElementById('lock-badge').classList.toggle('show',ST.locked);
  showToast(ST.locked?t('toastLocked'):t('toastUnlocked'));
}

/* SHARE */
function shareStation(){
  var s=ST.current,text=s?'🎵 '+s.name+' — Wild Peaks Radio\n'+location.href:'Wild Peaks Radio\n'+location.href;
  if(navigator.share)navigator.share({title:'Wild Peaks Radio',text:text,url:location.href}).catch(function(){});
  else if(navigator.clipboard)navigator.clipboard.writeText(text).then(function(){showToast(t('toastLinkCopied'));});
}

/* SEARCH */
var searchTimer=null;
function doSearch(q){
  clearTimeout(searchTimer);
  var el=document.getElementById('search-results');
  if(!q.trim()){el.innerHTML='';return;}
  searchTimer=setTimeout(function(){
    el.innerHTML='<div style="color:var(--sub);font-size:12px;padding:8px 0;">'+esc(t('searchSearching'))+'</div>';
    fetch(apiBase+'/json/stations/search?name='+encodeURIComponent(q)+'&limit=30&hidebroken=true')
    .then(function(r){return r.json();})
    .then(function(data){
      el.innerHTML='';
      if(!data.length){el.innerHTML='<div style="color:var(--sub);font-size:12px;padding:8px 0;">'+esc(t('searchNoResults'))+'</div>';return;}
      for(var i=0;i<data.length;i++){(function(raw){
        var s={name:(raw.name||'').trim()||'Unknown',url:raw.url_resolved||raw.url,lat:parseFloat(raw.geo_lat)||0,lon:parseFloat(raw.geo_long)||0,country:raw.country||'',state:raw.state||'',codec:raw.codec||'',bitrate:parseInt(raw.bitrate)||0,uuid:raw.stationuuid||''};
        var div=document.createElement('div');div.className='si';
        div.innerHTML='<div class="si-dot"></div><div class="si-body"><div class="si-name">'+esc(s.name)+'</div><div class="si-meta">'+s.country+(s.state?' · '+s.state:'')+'</div></div>';
        div.onclick=function(){play(s);ST.sheetList=[s];closeTab('search');showToast(t('toastPlaySearch',{name:s.name}));};
        el.appendChild(div);
      })(data[i]);}
    })
    .catch(function(){el.innerHTML='<div style="color:var(--sub);font-size:12px;">'+esc(t('searchError'))+'</div>';});
  },380);
}

function resolveLang(code){
  if(code&&code!=='auto'&&translations[code])return code;
  var nav=((navigator.language||navigator.userLanguage||'en')+'').toLowerCase();
  var codes=Object.keys(translations);
  for(var i=0;i<codes.length;i++){if(nav===codes[i].toLowerCase())return codes[i];}
  var navBase=nav.split('-')[0];
  for(var i=0;i<codes.length;i++){if(codes[i].toLowerCase().split('-')[0]===navBase)return codes[i];}
  return 'en';
}

function t(key,vars){
  var lang=resolveLang(ST.lang);
  var dict=translations[lang]||translations.en;
  var str=(dict[key]!==undefined)?dict[key]:(translations.en[key]!==undefined?translations.en[key]:key);
  if(vars)for(var k in vars)str=str.split('{'+k+'}').join(vars[k]);
  return str;
}

/* 정적 텍스트(data-i18n) + 언어 버튼 라벨 + 현재 화면 상태(재생 안내문/즐겨찾기/시트 등)를
   전부 다시 렌더링한다. 언어를 바꾼 순간 화면에 보이는 모든 텍스트가 즉시 갱신되도록. */
function applyTranslations(){
  document.querySelectorAll('[data-i18n]').forEach(function(el){el.textContent=t(el.getAttribute('data-i18n'));});
  document.querySelectorAll('[data-i18n-placeholder]').forEach(function(el){el.placeholder=t(el.getAttribute('data-i18n-placeholder'));});
  document.querySelectorAll('.lbtn').forEach(function(x){
    var c=x.dataset.code,f=LANGS.find(function(l){return l[0]===c;});
    if(!f)return;
    var label=c==='auto'?t('langAuto'):f[1];
    x.textContent=(ST.lang===c?'✓ ':'')+label;
  });
  renderAbout();
  refreshDynamicUI();
}

function renderAbout(){
  var el=document.getElementById('about-box');
  if(!el)return;
  el.innerHTML='<strong>Wild Peaks Radio v2.0</strong><br>'+t('aboutDesc')+'<br><br>'+t('aboutDataLabel')+': <strong>radio-browser.info</strong><br>'+t('about3dLabel')+': <strong>Three.js r128</strong>';
}

function countryStationsLabel(country){
  return t('countryStations',{country:country||t('sheetDefaultCity')});
}

/* 현재 화면 상태를 새 언어로 다시 그린다: 재생 중이 아니면 기본 안내문, 즐겨찾기/시트가
   열려 있으면 그 목록도 새 언어로 갱신한다. */
function refreshDynamicUI(){
  if(!ST.current){
    document.getElementById('p-city').textContent=t('playerDefaultCity');
    document.getElementById('p-country').textContent=t('playerDefaultCountry');
    document.getElementById('p-station').textContent=t('playerDefaultStation');
  }
  if(document.getElementById('tab-fav').classList.contains('open'))renderFav();
  if(document.getElementById('sheet').classList.contains('open')&&ST.currentCluster){
    document.getElementById('sh-meta').textContent=t('stationCount',{n:ST.currentCluster.stations.length});
    renderSheetList(ST.currentCluster);
  }
}

function setLang(code){
  ST.lang=code;
  localStorage.setItem('wp_lang',code);
  applyTranslations();
}

function initSettings(){
  var g=document.getElementById('lang-grid');
  for(var i=0;i<LANGS.length;i++){(function(code){
    var b=document.createElement('button');
    b.className='lbtn'+(ST.lang===code?' on':'');b.dataset.code=code;
    b.onclick=function(){setLang(code);};
    g.appendChild(b);
  })(LANGS[i][0]);}
  document.querySelectorAll('.szbtn').forEach(function(b){b.classList.toggle('on',b.dataset.s===ST.dotSize);});
}
function setDotSize(s){ST.dotSize=s;localStorage.setItem('wp_dotsize',s);document.querySelectorAll('.szbtn').forEach(function(b){b.classList.toggle('on',b.dataset.s===s);});buildDots();}

/* TABS */
function switchTab(t){
  document.querySelectorAll('.nbtn').forEach(function(b){b.classList.toggle('on',b.dataset.t===t);});
  document.querySelectorAll('.tab').forEach(function(p){p.classList.remove('open');});
  if(t==='globe')return;
  document.getElementById('tab-'+t).classList.add('open');
  if(t==='fav')renderFav();
  if(t==='search')setTimeout(function(){document.getElementById('search-input').focus();},200);
}
function closeTab(t){
  document.getElementById('tab-'+t).classList.remove('open');
  document.querySelectorAll('.nbtn').forEach(function(b){b.classList.toggle('on',b.dataset.t==='globe');});
}

/* TOAST */
var toastT=null;
function showToast(msg){var el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');clearTimeout(toastT);toastT=setTimeout(function(){el.classList.remove('show');},2600);}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

/* INIT */
var _audioUnlocked=false;
function unlockAudio(){
  if(_audioUnlocked)return;_audioUnlocked=true;
  audio.play().then(function(){audio.pause();}).catch(function(){});
}

initSettings();
applyTranslations();
// CDN에서 three.js 로드가 안 되거나(네트워크/차단) WebGL을 못 쓰는 환경이면
// initGlobe()가 여기서 예외를 던지는데, try/catch가 없으면 스크립트 실행이
// 여기서 멈춰버려 그 아래 정의된 enterApp() 관련 로직까지 영향을 줄 수 있었다.
// (splash 리스너는 이제 스크립트 최상단에서 먼저 연결되므로 이 실패와 무관하게 탭은 항상 반응한다.)
var _threeReady=false;
try{
  initGlobe();
  cam.position.z=12;
  _threeReady=true;
}catch(err){
  console.error('3D 지구본 초기화 실패:',err);
}

function enterApp(){
  if(window._entered)return;window._entered=true;
  unlockAudio();
  var sp=document.getElementById('splash');
  sp.classList.add('out');
  setTimeout(function(){sp.style.display='none';},600);
  if(!_threeReady){
    showToast(t('toastWebglError'));
    return;
  }
  if(navigator.geolocation){
    navigator.geolocation.getCurrentPosition(function(pos){
      ST.myLat=pos.coords.latitude;ST.myLon=pos.coords.longitude;ST.hasGPS=true;
      console.log('GPS:',ST.myLat,ST.myLon);
      flyTo(ST.myLat,ST.myLon,1.8);
      if(ST.stationsReady)autoPlayNearby();
    },function(err){
      console.warn('GPS 실패:',err.message);
      // hasGPS는 false로 유지한다. GPS 실패를 (0,0) 좌표의 "실제 위치"로 취급하면
      // autoPlayNearby()가 적도/기니만 인근(Null Island)에서 가장 가까운 방송국을
      // 마치 사용자 위치 기준인 것처럼 자동 재생해버리는 문제가 있었다(예: 가나 방송국 고정 재생).
      zoomTarget=3.0;
    },{enableHighAccuracy:true,timeout:8000,maximumAge:0});
  }else{zoomTarget=3.0;}
  loadStations();
}
</script>
