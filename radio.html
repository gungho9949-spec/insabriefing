<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>라디오 글로브</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Helvetica Neue',Arial,sans-serif;color:#fff;touch-action:none;}
#globe-wrap{position:fixed;inset:0;bottom:136px;background:#000;}
#c{width:100%;height:100%;display:block;}
#loading{position:fixed;inset:0;bottom:136px;background:#000;z-index:500;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;transition:opacity .6s;}
#loading.hide{opacity:0;pointer-events:none;}
#ld-bar{width:200px;height:3px;background:#111;border-radius:2px;overflow:hidden;}
#ld-fill{height:100%;width:0%;background:#4dff91;border-radius:2px;transition:width .3s;}
#ld-txt{font-size:13px;color:#4dff91;}
#panel{position:fixed;left:0;right:0;bottom:52px;height:84px;background:rgba(8,8,16,0.97);border-top:1px solid #1c1c30;padding:10px 16px 6px;display:flex;flex-direction:column;z-index:50;}
#row1{display:flex;align-items:center;gap:12px;margin-bottom:7px;}
#badge{width:34px;height:34px;border-radius:50%;background:#111;border:1.5px solid #2a2a50;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:#4dff91;flex-shrink:0;}
#city-name{font-size:21px;font-weight:700;line-height:1;}
#city-country{font-size:12px;color:#777;margin-top:2px;}
#clock{margin-left:auto;font-size:15px;color:#666;font-variant-numeric:tabular-nums;}
#row2{display:flex;align-items:center;gap:8px;border-top:1px solid #161625;padding-top:7px;}
#freq-box{flex:1;min-width:0;}
#freq-name{color:#4dff91;font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
#freq-city{font-size:11px;color:#444;margin-top:1px;}
#status{font-size:10px;color:#444;margin-top:1px;min-height:12px;}
#status.on{color:#4dff91;}#status.er{color:#ff5566;}
#eq{display:none;align-items:flex-end;gap:2px;height:14px;margin-left:5px;}
#eq.on{display:flex;}
.eb{width:3px;background:#4dff91;border-radius:1px;animation:eqb .45s ease-in-out infinite alternate;}
.eb:nth-child(1){animation-delay:0s}.eb:nth-child(2){animation-delay:.1s}.eb:nth-child(3){animation-delay:.2s}.eb:nth-child(4){animation-delay:.05s}
@keyframes eqb{from{height:2px}to{height:13px}}
.cbtn{background:none;border:none;color:#bbb;cursor:pointer;font-size:18px;padding:4px 6px;}
#play-btn{font-size:21px;color:#fff;}
#nav{position:fixed;left:0;right:0;bottom:0;height:52px;background:#060610;border-top:1px solid #161625;display:flex;justify-content:space-around;align-items:center;z-index:60;}
.ni{display:flex;flex-direction:column;align-items:center;gap:2px;font-size:9px;color:#333;cursor:pointer;}
.ni.active{color:#4dff91;}.ni svg{width:20px;height:20px;}
#overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:200;align-items:flex-end;}
#overlay.open{display:flex;}
#sheet{width:100%;max-height:62vh;overflow-y:auto;background:#0c0c1c;border-radius:16px 16px 0 0;padding-bottom:24px;}
#sh-head{position:sticky;top:0;background:#0c0c1c;padding:14px 16px 10px;border-bottom:1px solid #191928;display:flex;justify-content:space-between;align-items:center;}
#sh-title{font-size:13px;font-weight:700;color:#4dff91;}
#sh-close{background:none;border:none;color:#666;font-size:20px;cursor:pointer;}
.sitem{padding:11px 16px;border-bottom:1px solid #111;cursor:pointer;}
.sitem:active,.sitem:hover{background:#141428;}
.si-name{font-size:13px;font-weight:600;}.si-meta{font-size:11px;color:#444;margin-top:2px;}
#tip{position:fixed;pointer-events:none;background:rgba(4,4,14,.92);border:1px solid #4dff91;border-radius:7px;padding:6px 10px;font-size:12px;display:none;z-index:300;white-space:nowrap;}
#tip-n{font-weight:700;color:#4dff91;font-size:13px;}#tip-c{color:#aaa;font-size:10px;}
#zoom-wrap{position:fixed;right:14px;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;gap:8px;z-index:40;}
.zbtn{width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,.12);border:none;color:#fff;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
#back-btn{position:fixed;left:14px;top:16px;background:rgba(0,0,0,.5);border:1px solid #333;border-radius:20px;color:#fff;font-size:13px;padding:6px 14px;cursor:pointer;z-index:40;}
</style>
</head>
<body>
<div id="loading">
  <div style="font-size:36px">🌍</div>
  <div id="ld-txt">지구본 불러오는 중…</div>
  <div id="ld-bar"><div id="ld-fill"></div></div>
</div>
<div id="globe-wrap"><canvas id="c"></canvas></div>
<button id="back-btn" onclick="history.back()">← 인사브리핑</button>
<div id="zoom-wrap">
  <button class="zbtn" id="zin">+</button>
  <button class="zbtn" id="zout">−</button>
</div>
<div id="panel">
  <div id="row1">
    <div id="badge">●</div>
    <div><div id="city-name">지구를 클릭하세요</div><div id="city-country">도시를 선택해 라디오를 들으세요</div></div>
    <div id="clock">--:--</div>
  </div>
  <div id="row2">
    <div id="freq-box">
      <div style="display:flex;align-items:center">
        <div id="freq-name">Radio Globe</div>
        <div id="eq"><div class="eb"></div><div class="eb"></div><div class="eb"></div><div class="eb"></div></div>
      </div>
      <div id="freq-city"></div>
      <div id="status"></div>
    </div>
    <button class="cbtn" id="mute-btn">🔊</button>
    <button class="cbtn" id="play-btn">▶</button>
    <button class="cbtn" id="next-btn">⏭</button>
  </div>
</div>
<div id="nav">
  <div class="ni active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="2"/></svg>탐색</div>
  <div class="ni"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>즐겨찾기</div>
  <div class="ni"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="3 11 22 2 13 21 11 13 3 11"/></svg>둘러보기</div>
  <div class="ni"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>검색</div>
  <div class="ni"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>설정</div>
</div>
<div id="overlay"><div id="sheet"><div id="sh-head"><span id="sh-title">방송국 선택</span><button id="sh-close">✕</button></div><div id="sh-body"></div></div></div>
<div id="tip"><div id="tip-n"></div><div id="tip-c"></div></div>
<audio id="aud" preload="none"></audio>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const CITIES=[
{lat:37.57,lon:126.98,name:"서울",country:"한국",cc:"KR"},{lat:35.10,lon:129.03,name:"부산",country:"한국",cc:"KR"},
{lat:35.87,lon:128.60,name:"대구",country:"한국",cc:"KR"},{lat:37.45,lon:126.70,name:"인천",country:"한국",cc:"KR"},
{lat:35.16,lon:126.85,name:"광주",country:"한국",cc:"KR"},{lat:36.35,lon:127.38,name:"대전",country:"한국",cc:"KR"},

{lat:34.69,lon:135.50,name:"오사카",country:"일본",cc:"JP"},{lat:43.06,lon:141.35,name:"삿포로",country:"일본",cc:"JP"},
{lat:33.59,lon:130.40,name:"후쿠오카",country:"일본",cc:"JP"},{lat:39.91,lon:116.39,name:"베이징",country:"중국",cc:"CN"},
{lat:31.23,lon:121.47,name:"상하이",country:"중국",cc:"CN"},{lat:43.83,lon:87.62,name:"우루무치",country:"중국",cc:"CN"},
{lat:22.28,lon:114.16,name:"홍콩",country:"홍콩",cc:"HK"},{lat:51.51,lon:-0.13,name:"런던",country:"영국",cc:"GB"},
{lat:48.86,lon:2.35,name:"파리",country:"프랑스",cc:"FR"},{lat:52.52,lon:13.40,name:"베를린",country:"독일",cc:"DE"},
{lat:41.90,lon:12.50,name:"로마",country:"이탈리아",cc:"IT"},{lat:40.42,lon:-3.70,name:"마드리드",country:"스페인",cc:"ES"},
{lat:55.76,lon:37.62,name:"모스크바",country:"러시아",cc:"RU"},{lat:40.71,lon:-74.01,name:"뉴욕",country:"미국",cc:"US"},
{lat:34.05,lon:-118.24,name:"로스앤젤레스",country:"미국",cc:"US"},{lat:41.88,lon:-87.63,name:"시카고",country:"미국",cc:"US"},
{lat:47.61,lon:-122.33,name:"시애틀",country:"미국",cc:"US"},{lat:25.77,lon:-80.19,name:"마이애미",country:"미국",cc:"US"},
{lat:43.65,lon:-79.38,name:"토론토",country:"캐나다",cc:"CA"},{lat:45.51,lon:-73.55,name:"몬트리올",country:"캐나다",cc:"CA"},
{lat:49.25,lon:-123.12,name:"밴쿠버",country:"캐나다",cc:"CA"},{lat:19.43,lon:-99.13,name:"멕시코시티",country:"멕시코",cc:"MX"},
{lat:-23.55,lon:-46.63,name:"상파울루",country:"브라질",cc:"BR"},{lat:-34.61,lon:-58.38,name:"부에노스아이레스",country:"아르헨티나",cc:"AR"},
{lat:28.61,lon:77.21,name:"뉴델리",country:"인도",cc:"IN"},{lat:19.08,lon:72.88,name:"뭄바이",country:"인도",cc:"IN"},
{lat:25.20,lon:55.27,name:"두바이",country:"UAE",cc:"AE"},{lat:41.01,lon:28.98,name:"이스탄불",country:"터키",cc:"TR"},

{lat:14.60,lon:120.98,name:"마닐라",country:"필리핀",cc:"PH"},{lat:-6.21,lon:106.85,name:"자카르타",country:"인도네시아",cc:"ID"},
{lat:10.82,lon:106.63,name:"호치민",country:"베트남",cc:"VN"},{lat:-33.87,lon:151.21,name:"시드니",country:"호주",cc:"AU"},
{lat:-37.81,lon:144.96,name:"멜버른",country:"호주",cc:"AU"},{lat:-36.87,lon:174.77,name:"오클랜드",country:"뉴질랜드",cc:"NZ"},
{lat:59.33,lon:18.07,name:"스톡홀름",country:"스웨덴",cc:"SE"},{lat:59.91,lon:10.75,name:"오슬로",country:"노르웨이",cc:"NO"},
{lat:52.37,lon:4.90,name:"암스테르담",country:"네덜란드",cc:"NL"},{lat:48.21,lon:16.37,name:"빈",country:"오스트리아",cc:"AT"},
{lat:50.85,lon:4.35,name:"브뤼셀",country:"벨기에",cc:"BE"},{lat:47.38,lon:8.54,name:"취리히",country:"스위스",cc:"CH"},
{lat:55.68,lon:12.57,name:"코펜하겐",country:"덴마크",cc:"DK"},{lat:60.17,lon:24.94,name:"헬싱키",country:"핀란드",cc:"FI"},
{lat:24.69,lon:46.72,name:"리야드",country:"사우디",cc:"SA"},{lat:4.71,lon:-74.07,name:"보고타",country:"콜롬비아",cc:"CO"},
{lat:-1.29,lon:36.82,name:"나이로비",country:"케냐",cc:"KE"},{lat:-33.46,lon:-70.65,name:"산티아고",country:"칠레",cc:"CL"},
];

const ldEl=document.getElementById('loading');
const ldFill=document.getElementById('ld-fill');
const ldTxt=document.getElementById('ld-txt');
function onLoad(msg,pct){ldFill.style.width=pct+'%';ldTxt.textContent=msg;if(pct>=100){setTimeout(()=>ldEl.classList.add('hide'),400);}}

const wrap=document.getElementById('globe-wrap');
const canvas=document.getElementById('c');
const renderer=new THREE.WebGLRenderer({canvas,antialias:true,powerPreference:'high-performance'});
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2.5));
renderer.setClearColor(0x000005,1);
const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(40,1,0.01,100);
camera.position.set(0,0,2.8);

// 지구
const earthGeo=new THREE.SphereGeometry(1,96,96);
const earthMat=new THREE.MeshPhongMaterial({color:0x2255aa,shininess:15,specular:new THREE.Color(0x224466)});
const earth=new THREE.Mesh(earthGeo,earthMat);
const TL=new THREE.TextureLoader();
TL.crossOrigin='anonymous';
onLoad('지구 텍스처 불러오는 중…',10);
TL.load('https://insabriefing-s2uw.vercel.app/earth.jpg',
  t=>{t.anisotropy=renderer.capabilities.getMaxAnisotropy();t.minFilter=THREE.LinearMipmapLinearFilter;earthMat.map=t;earthMat.color=new THREE.Color(0xffffff);earthMat.needsUpdate=true;onLoad('완료 ✓',100);},
  xhr=>{if(xhr.total)onLoad('불러오는 중… '+Math.round(xhr.loaded/xhr.total*100)+'%',Math.min(90,xhr.loaded/xhr.total*90));},
  ()=>onLoad('로드 실패',100)
);

// 대기
const atmMat=new THREE.ShaderMaterial({side:THREE.FrontSide,transparent:true,depthWrite:false,uniforms:{},
  vertexShader:`varying vec3 vN,vV;void main(){vN=normalize(normalMatrix*normal);vV=normalize(-(modelViewMatrix*vec4(position,1.0)).xyz);gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);}`,
  fragmentShader:`varying vec3 vN,vV;void main(){float f=pow(1.0-dot(vN,vV),4.5);gl_FragColor=vec4(0.18,0.5,1.0,f*0.6);}`});
const atm=new THREE.Mesh(new THREE.SphereGeometry(1.022,48,48),atmMat);

// 별
const sv=[];for(let i=0;i<8000;i++){const r=85,t=Math.random()*Math.PI*2,p=Math.acos(2*Math.random()-1);sv.push(r*Math.sin(p)*Math.cos(t),r*Math.cos(p),r*Math.sin(p)*Math.sin(t));}
const starGeo=new THREE.BufferGeometry();starGeo.setAttribute('position',new THREE.Float32BufferAttribute(sv,3));
scene.add(new THREE.Points(starGeo,new THREE.PointsMaterial({color:0xffffff,size:0.16,transparent:true,opacity:0.8,sizeAttenuation:true})));

// 조명
const sun=new THREE.DirectionalLight(0xfff8f0,1.4);sun.position.set(5,2,4);scene.add(sun);
scene.add(new THREE.AmbientLight(0x0a1828,1.1));

// 지구 그룹 (지구+점 함께 회전)
const globeGroup=new THREE.Group();
globeGroup.add(earth,atm);
scene.add(globeGroup);
globeGroup.rotation.y=-2.2;
globeGroup.rotation.x=-0.25;

// 위경도 → 3D 좌표
function ll2v3(lat,lon,r=1.02){
  const phi=(90-lat)*Math.PI/180,th=(lon+180)*Math.PI/180;
  return new THREE.Vector3(
    -r*Math.sin(phi)*Math.cos(th),
     r*Math.cos(phi),
     r*Math.sin(phi)*Math.sin(th)
  );
}

// 도시 점 — Mesh로 만들어서 지구와 함께 회전
const dotMat=new THREE.MeshBasicMaterial({color:0x4dff91,transparent:true,opacity:0.9});
const dotSelMat=new THREE.MeshBasicMaterial({color:0xffffff,transparent:true,opacity:1.0});
const dotGeo=new THREE.SphereGeometry(0.008,8,8);

const meshes=[];
for(const city of CITIES){
  const m=new THREE.Mesh(dotGeo,dotMat.clone());
  m.position.copy(ll2v3(city.lat,city.lon));
  m.userData.city=city;
  globeGroup.add(m); // 지구 그룹에 추가 → 함께 회전!
  meshes.push(m);
}

// 선택 링
const ringMat=new THREE.MeshBasicMaterial({color:0xffffff,side:THREE.DoubleSide,transparent:true,opacity:0.9,depthTest:false});
const ring=new THREE.Mesh(new THREE.RingGeometry(0.022,0.032,48),ringMat);
ring.visible=false;
globeGroup.add(ring);

// 리사이즈
function onResize(){const w=wrap.clientWidth,h=wrap.clientHeight;renderer.setSize(w,h);camera.aspect=w/h;camera.updateProjectionMatrix();}
onResize();window.addEventListener('resize',onResize);

// 드래그 & 줌
let drag=false,didMove=false,lx=0,ly=0,vx=0,vy=0;
let autoSpin=true,zDist=2.8,pinching=false,pinchD0=0,zDist0=0;
const DRAG_SPEED=0.004,FRICTION=0.92,AUTO_SPIN=0.0003;
function pdist(t){return Math.hypot(t[0].clientX-t[1].clientX,t[0].clientY-t[1].clientY);}

canvas.addEventListener('mousedown',e=>{drag=true;didMove=false;lx=e.clientX;ly=e.clientY;vx=vy=0;autoSpin=false;},{passive:true});
window.addEventListener('mouseup',()=>{drag=false;});
window.addEventListener('mousemove',e=>{
  if(!drag)return;
  const dx=e.clientX-lx,dy=e.clientY-ly;
  if(Math.abs(dx)+Math.abs(dy)>2)didMove=true;
  vy=dx*DRAG_SPEED;vx=dy*DRAG_SPEED;
  globeGroup.rotation.y+=vy;
  globeGroup.rotation.x=Math.max(-Math.PI/2,Math.min(Math.PI/2,globeGroup.rotation.x+vx));
  lx=e.clientX;ly=e.clientY;
});
canvas.addEventListener('touchstart',e=>{
  e.preventDefault();
  if(e.touches.length===1){drag=true;didMove=false;lx=e.touches[0].clientX;ly=e.touches[0].clientY;vx=vy=0;autoSpin=false;}
  else if(e.touches.length===2){drag=false;pinching=true;pinchD0=pdist(e.touches);zDist0=zDist;}
},{passive:false});
window.addEventListener('touchend',e=>{drag=false;if(e.touches.length<2)pinching=false;},{passive:true});
window.addEventListener('touchmove',e=>{
  e.preventDefault();
  if(pinching&&e.touches.length===2){const d=pdist(e.touches);zDist=Math.max(1.2,Math.min(6,zDist0*(pinchD0/d)));camera.position.z=zDist;return;}
  if(!drag||e.touches.length!==1)return;
  const dx=e.touches[0].clientX-lx,dy=e.touches[0].clientY-ly;
  if(Math.abs(dx)+Math.abs(dy)>2)didMove=true;
  const spd=DRAG_SPEED*(zDist/2.8);
  vy=dx*spd;vx=dy*spd;
  globeGroup.rotation.y+=vy;
  globeGroup.rotation.x=Math.max(-Math.PI/2,Math.min(Math.PI/2,globeGroup.rotation.x+vx));
  lx=e.touches[0].clientX;ly=e.touches[0].clientY;
},{passive:false});
canvas.addEventListener('wheel',e=>{e.preventDefault();zDist*=e.deltaY<0?0.92:1.09;zDist=Math.max(1.2,Math.min(6,zDist));camera.position.z=zDist;},{passive:false});
document.getElementById('zin').onclick=()=>{zDist=Math.max(1.2,zDist*0.82);camera.position.z=zDist;};
document.getElementById('zout').onclick=()=>{zDist=Math.min(6,zDist*1.22);camera.position.z=zDist;};

// 레이캐스트
const ray=new THREE.Raycaster();
const mouse=new THREE.Vector2();
function hitMesh(ex,ey){
  const r=canvas.getBoundingClientRect();
  mouse.x=((ex-r.left)/r.width)*2-1;
  mouse.y=-((ey-r.top)/r.height)*2+1;
  ray.setFromCamera(mouse,camera);
  const hits=ray.intersectObjects(meshes);
  return hits.length?hits[0].object:null;
}
canvas.addEventListener('mouseup',e=>{if(!didMove)handleClick(e.clientX,e.clientY);});
canvas.addEventListener('touchend',e=>{if(!didMove&&e.changedTouches.length===1)handleClick(e.changedTouches[0].clientX,e.changedTouches[0].clientY);});

let selMesh=null;
function handleClick(ex,ey){
  const hit=hitMesh(ex,ey);
  if(!hit)return;
  if(selMesh&&selMesh!==hit)selMesh.material=dotMat.clone();
  selMesh=hit;
  hit.material=dotSelMat.clone();
  // 링 위치
  ring.position.copy(hit.position);
  ring.quaternion.setFromUnitVectors(new THREE.Vector3(0,0,1),hit.position.clone().normalize());
  ring.visible=true;
  selectCity(hit.userData.city);
}

// 호버 툴팁
const tip=document.getElementById('tip');
canvas.addEventListener('mousemove',e=>{
  if(drag){tip.style.display='none';return;}
  const hit=hitMesh(e.clientX,e.clientY);
  if(hit){
    document.getElementById('tip-n').textContent=hit.userData.city.name;
    document.getElementById('tip-c').textContent=hit.userData.city.country;
    tip.style.display='block';tip.style.left=(e.clientX+14)+'px';tip.style.top=(e.clientY-38)+'px';
    canvas.style.cursor='pointer';
  }else{tip.style.display='none';canvas.style.cursor='grab';}
});

// 렌더 루프
let frame=0;
(function animate(){
  requestAnimationFrame(animate);frame++;
  if(!drag&&!pinching){
    if(autoSpin){globeGroup.rotation.y+=AUTO_SPIN;}
    else{vx*=FRICTION;vy*=FRICTION;globeGroup.rotation.y+=vy;globeGroup.rotation.x=Math.max(-Math.PI/2,Math.min(Math.PI/2,globeGroup.rotation.x+vx));}
  }
  // 점 크기를 줌에 따라 조정
  const dotSize=0.015*(zDist/2.8);
  meshes.forEach(m=>{
    if(m!==selMesh)m.scale.setScalar(dotSize/0.015);
  });
  if(selMesh)selMesh.scale.setScalar(dotSize/0.015*1.5);
  if(ring.visible){ringMat.opacity=0.75+0.25*Math.sin(frame*0.09);ring.scale.setScalar(1+0.07*Math.sin(frame*0.07));}
  renderer.render(scene,camera);
})();

// 시계
function tick(){const n=new Date();document.getElementById('clock').textContent=String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0');}
tick();setInterval(tick,10000);

// 오디오
const aud=document.getElementById('aud');
let playing=false,muted=false,stations=[],stIdx=0;
function setStatus(m,c=''){const el=document.getElementById('status');el.textContent=m;el.className=c;}
function showEq(on){document.getElementById('eq').className=on?'on':'';}
async function fetchStations(cc){
  setStatus('방송국 검색 중…','on');
  try{
    const r=await fetch('https://de1.api.radio-browser.info/json/stations/search?countrycode='+cc+'&hidebroken=true&order=votes&reverse=true&limit=50',{headers:{'User-Agent':'RadioGlobe/2.0'}});
    const d=await r.json();
    return d.filter(s=>s.url_resolved&&/^https?:\/\//.test(s.url_resolved));
  }catch(e){setStatus('검색 실패','er');return[];}
}
function selectCity(city){
  document.getElementById('city-name').textContent=city.name;
  document.getElementById('city-country').textContent=city.country;
  document.getElementById('freq-city').textContent=city.name+', '+city.country;
  stopAudio();
  fetchStations(city.cc).then(list=>{
    stations=list;stIdx=0;
    if(!list.length){setStatus('방송국 없음','er');document.getElementById('freq-name').textContent=city.name;return;}
    openSheet(city,list);
  });
}
function playStation(s){
  stopAudio();
  document.getElementById('freq-name').textContent=s.name;
  setStatus('연결 중…','on');
  document.getElementById('play-btn').textContent='⏸';
  aud.src=s.url_resolved;aud.load();
  aud.play()
    .then(()=>{playing=true;setStatus('재생 중 ♪','on');showEq(true);})
    .catch(()=>{setStatus('오류 — ⏭ 로 다음 시도','er');document.getElementById('play-btn').textContent='▶';showEq(false);});
}
function stopAudio(){aud.pause();aud.src='';playing=false;document.getElementById('play-btn').textContent='▶';showEq(false);setStatus('');}
aud.addEventListener('error',()=>{setStatus('스트림 오류','er');showEq(false);document.getElementById('play-btn').textContent='▶';playing=false;});
document.getElementById('play-btn').onclick=()=>{
  if(!stations.length)return;
  if(playing){aud.pause();playing=false;document.getElementById('play-btn').textContent='▶';showEq(false);setStatus('일시정지');}
  else if(aud.src&&aud.src!==location.href){aud.play();playing=true;document.getElementById('play-btn').textContent='⏸';showEq(true);setStatus('재생 중 ♪','on');}
  else playStation(stations[stIdx]);
};
document.getElementById('next-btn').onclick=()=>{if(!stations.length)return;stIdx=(stIdx+1)%stations.length;playStation(stations[stIdx]);};
document.getElementById('mute-btn').onclick=()=>{muted=!muted;aud.muted=muted;document.getElementById('mute-btn').textContent=muted?'🔇':'🔊';};
function openSheet(city,list){
  document.getElementById('sh-title').textContent=city.name+' 방송국 '+list.length+'개';
  const body=document.getElementById('sh-body');body.innerHTML='';
  list.forEach((s,i)=>{
    const d=document.createElement('div');d.className='sitem';
    const m=[s.codec,s.bitrate?s.bitrate+'kbps':'',s.language].filter(Boolean).join(' · ');
    d.innerHTML='<div class="si-name">'+s.name+'</div><div class="si-meta">'+(m||'—')+'</div>';
    d.onclick=()=>{stIdx=i;closeSheet();playStation(s);};
    body.appendChild(d);
  });
  document.getElementById('overlay').classList.add('open');
}
function closeSheet(){document.getElementById('overlay').classList.remove('open');}
document.getElementById('sh-close').onclick=closeSheet;
document.getElementById('overlay').onclick=e=>{if(e.target===document.getElementById('overlay'))closeSheet();};
</script>
</body>
